<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="version" content="v9-fix-400">
    <meta name="theme-color" content="#d4a574">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="shortcut icon" href="/static/favicon.ico">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <style>
        :root {
            --bg: #faf7f2;
            --bg-soft: #f5efe6;
            --card-bg: #fffdf9;
            --card-bg-hover: #fffefc;
            --text: #2d2418;
            --text-secondary: #5c4f3d;
            --text-tertiary: #8a7b68;
            --border: #e6dccf;
            --border-light: #f0e8da;
            --primary: #c8966a;
            --primary-light: #dbb88c;
            --primary-dark: #b07d4f;
            --primary-glow: rgba(200, 150, 106, 0.18);
            --primary-hover: #b88050;
            --secondary: #9b8b7a;
            --secondary-hover: #7d6f60;
            --shadow-sm: 0 1px 3px rgba(80, 50, 20, 0.04);
            --shadow: rgba(140, 100, 60, 0.07);
            --shadow-md: 0 4px 16px rgba(100, 60, 20, 0.08);
            --shadow-lg: 0 8px 30px rgba(80, 40, 15, 0.10);
            --shadow-card: 0 2px 8px rgba(140, 100, 60, 0.06);
            --shadow-card-hover: 0 8px 28px rgba(120, 70, 30, 0.13);
            --noti-bg: #fffdf9;
            --comment-highlight: rgba(200, 150, 106, 0.10);
            --search-bg: #f5ede2;
            --search-glow: rgba(200, 150, 106, 0.10);
            --bell-bg: #fffdf9;
            --bell-icon: #9b8b7a;
            --bell-gradient-start: #c8966a;
            --bell-gradient-end: #dbb88c;
            --avatar-bg: #f5ede2;
            --accent-subtle: #faf5ee;
            --text-on-primary: #fff;
            --overlay-bg: rgba(40, 20, 5, 0.45);
            --card-radius: 14px;
            --card-radius-sm: 10px;
            --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.dark-mode {
            --bg: #1a1512;
            --bg-soft: #1f1a16;
            --card-bg: #241e19;
            --card-bg-hover: #2a231d;
            --text: #e8e0d5;
            --text-secondary: #bfb09c;
            --text-tertiary: #8c7d6b;
            --border: #3d3228;
            --border-light: #352b22;
            --primary: #c8966a;
            --primary-light: #d4a87c;
            --primary-dark: #b07d4f;
            --primary-glow: rgba(200, 150, 106, 0.2);
            --primary-hover: #d4a87c;
            --secondary: #8c7d6b;
            --secondary-hover: #a09080;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.25);
            --shadow: rgba(0, 0, 0, 0.35);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.5);
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-card-hover: 0 8px 28px rgba(0, 0, 0, 0.5);
            --noti-bg: #241e19;
            --comment-highlight: rgba(200, 150, 106, 0.12);
            --search-bg: #2a231d;
            --search-glow: rgba(200, 150, 106, 0.18);
            --bell-bg: #241e19;
            --bell-icon: #a09080;
            --bell-gradient-start: #c8966a;
            --bell-gradient-end: #e0c8a8;
            --avatar-bg: #3d3228;
            --accent-subtle: #241e19;
            --text-on-primary: #1a1512;
            --overlay-bg: rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: none !important;
        }
        ::-webkit-scrollbar,
        *::-webkit-scrollbar {
            display: none !important;
        }

        body {
            font-family: 'Noto Serif SC', 'SimSun', 'STSong', '宋体', 'LXGW WenKai', serif;
            font-weight: 500;
            max-width: 100%;
            margin: 0;
            padding: 20px 28px;
            background: var(--bg);
            line-height: 1.7;
            color: var(--text);
            transition: background 0.4s ease, color 0.4s ease;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 10%, var(--accent-subtle) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, var(--accent-subtle) 0%, transparent 60%);
        }

        body> :where(.toolbar, .status-bar),
        .EasyMDEContainer {
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        h1,
        h2,
        h3 {
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        h1 {
            font-size: 1.7em;
            letter-spacing: 0.03em;
        }
        h2 {
            font-size: 1.2em;
            color: var(--text);
        }
        .hidden {
            display: none !important;
        }

        /* ========== 认证容器 ========== */
        .auth-container {
            max-width: 420px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 30px 28px;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-dark), var(--primary-light), var(--primary-dark));
            border-radius: 3px 3px 0 0;
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            gap: 4px;
            background: var(--bg-soft);
            border-radius: 30px;
            padding: 4px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 28px;
            font-weight: 600;
            color: var(--text-tertiary);
            transition: all var(--transition-smooth);
            font-size: 0.95em;
            letter-spacing: 0.03em;
        }
        .auth-tab.active {
            background: var(--card-bg);
            color: var(--primary-dark);
            box-shadow: var(--shadow-sm);
            font-weight: 700;
        }
        .auth-tab:hover:not(.active) {
            color: var(--text-secondary);
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9em;
            letter-spacing: 0.02em;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            background: var(--bg-soft);
            color: var(--text);
            transition: all var(--transition-fast);
            letter-spacing: 0.02em;
        }
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: var(--card-bg);
            outline: none;
        }
        .form-group input::placeholder {
            color: var(--text-tertiary);
            opacity: 0.7;
        }

        button {
            padding: 12px 22px;
            background: var(--primary);
            color: var(--text-on-primary);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            font-weight: 600;
            transition: all var(--transition-smooth);
            outline: none;
            letter-spacing: 0.03em;
            position: relative;
            overflow: hidden;
        }
        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px var(--primary-glow);
        }
        button:active {
            transform: scale(0.97);
            transition: transform 0.1s;
        }
        .basic-btn:hover {
            background: linear-gradient(to top, #D8D9DB 0%, #fff 80%, #FDFDFD 100%) !important;
            transform: translateY(-1px);
        }
        .error-message {
            color: #d44;
            margin-top: 12px;
            font-size: 0.9em;
            text-align: center;
        }

        /* ========== 导航栏 ========== */
        .navbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border-light);
            gap: 10px;
        }
        .navbar h1 {
            border: none;
            margin: 0;
            font-size: 1.5em;
            color: var(--text);
            letter-spacing: 0.04em;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .avatar,
        .noti-avatar,
        .profile-avatar,
        .avatar-placeholder {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid var(--border-light);
            transition: all var(--transition-fast);
        }
        .avatar:hover,
        .profile-avatar:hover {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }
        .avatar,
        .noti-avatar,
        .profile-avatar {
            background: var(--avatar-bg);
        }
        .avatar-placeholder {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1em;
            letter-spacing: 0.04em;
        }
        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .nav-links button {
            padding: 8px 16px;
            font-size: 13px;
            background: var(--secondary);
            letter-spacing: 0.03em;
        }
        .nav-links button:hover {
            background: var(--secondary-hover);
        }

        /* ========== 通知 ========== */
        .notification-wrapper {
            position: relative;
            display: inline-block;
        }
        .noti-bell {
            position: relative;
            width: 40px;
            height: 40px;
            background: var(--bell-bg);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-smooth);
            border: 1.5px solid var(--border-light);
            padding: 0;
            outline: none;
            overflow: visible;
        }
        .noti-bell:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
            border-color: var(--primary-light);
        }
        .bell-icon {
            font-size: 1.3em;
            color: var(--bell-icon);
            transition: transform var(--transition-spring);
        }
        .noti-bell:hover .bell-icon {
            transform: rotate(-15deg) scale(1.1);
        }
        .noti-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: none;
            transition: all var(--transition-spring);
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(231, 76, 60, 0.35);
            padding: 0 5px;
        }
        .noti-bell:hover .noti-badge {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.45);
        }
        .noti-dropdown {
            position: absolute;
            right: -10px;
            top: 52px;
            width: 340px;
            max-width: 90vw;
            background: var(--noti-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            z-index: 999;
            display: none;
            max-height: 420px;
            overflow-y: auto;
            animation: dropdownIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes dropdownIn {
            from {
                opacity: 0;
                transform: translateY(-12px) scale(0.94);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .noti-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 0.95em;
            letter-spacing: 0.03em;
            color: var(--text);
            position: sticky;
            top: 0;
            background: var(--noti-bg);
            z-index: 2;
            border-radius: 16px 16px 0 0;
        }
        .noti-item {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .noti-item:hover {
            background: var(--bg-soft);
        }
        .noti-item.unread {
            background: var(--comment-highlight);
            border-left: 3px solid var(--primary);
        }
        .noti-item img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-light);
            flex-shrink: 0;
        }
        .noti-content {
            flex: 1;
            font-size: 0.88em;
            line-height: 1.5;
            color: var(--text);
        }
        .noti-time {
            font-size: 0.75em;
            opacity: 0.6;
            margin-top: 4px;
            color: var(--text-tertiary);
        }
        .noti-empty {
            padding: 30px;
            text-align: center;
            opacity: 0.6;
            color: var(--text-tertiary);
        }

        /* ========== 主题切换开关 ========== */
        .switch {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            font-size: 16px;
            display: inline-block;
            width: 3.5em;
            height: 2em;
            transform-style: preserve-3d;
            perspective: 500px;
            animation: toggle__animation 3s ease-in-out infinite;
            cursor: pointer;
        }
        .switch::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            filter: blur(20px);
            z-index: -1;
            border-radius: 50px;
            background-color: #d8ff99;
            background-image: radial-gradient(at 21% 46%, hsla(183, 65%, 60%, 1) 0px, transparent 50%),
                radial-gradient(at 23% 25%, hsla(359, 74%, 70%, 1) 0px, transparent 50%),
                radial-gradient(at 20% 1%, hsla(267, 83%, 75%, 1) 0px, transparent 50%),
                radial-gradient(at 86% 87%, hsla(204, 69%, 68%, 1) 0px, transparent 50%),
                radial-gradient(at 99% 41%, hsla(171, 72%, 77%, 1) 0px, transparent 50%),
                radial-gradient(at 55% 24%, hsla(138, 60%, 62%, 1) 0px, transparent 50%);
            opacity: 0.7;
            transition: opacity var(--transition-smooth);
        }
        .switch:hover::before {
            opacity: 1;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #fdfefedc;
            transition: .4s;
            border-radius: 30px;
            box-shadow: var(--shadow-sm);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 1.4em;
            width: 1.4em;
            left: 0.3em;
            bottom: 0.35em;
            transition: .4s;
            border-radius: 50%;
            box-shadow: rgba(0, 0, 0, 0.17) 0px -10px 10px 0px inset,
                rgba(0, 0, 0, 0.09) 0px -1px 15px -8px;
            background-color: #ff99fd;
            background-image: radial-gradient(at 81% 39%, hsla(327, 79%, 79%, 1) 0px, transparent 50%),
                radial-gradient(at 11% 72%, hsla(264, 64%, 79%, 1) 0px, transparent 50%),
                radial-gradient(at 23% 20%, hsla(75, 98%, 71%, 1) 0px, transparent 50%);
        }
        .input__check:checked+.slider {
            background-color: #1a1d28;
        }
        .input__check:checked+.slider:before {
            transform: translateX(1.5em);
        }
        @keyframes toggle__animation {
            0%,
            100% {
                transform: translateY(-8px) rotateX(15deg) rotateY(-20deg);
            }
            50% {
                transform: translateY(0px) rotateX(15deg) rotateY(-20deg);
            }
        }

        /* ========== 合集栏 ========== */
        #collectionSection {
            margin-bottom: 20px;
        }
        #collectionSection h3 {
            color: var(--text);
            margin-bottom: 8px;
            font-size: 0.95em;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        #collectionBar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 6px 2px 10px;
            scrollbar-width: thin;
        }
        #collectionBar::-webkit-scrollbar {
            height: 3px;
            display: block !important;
        }
        #collectionBar::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 4px;
        }
        .collection-chip {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 18px;
            border-radius: 24px;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            cursor: pointer;
            transition: all var(--transition-smooth);
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
        }
        .collection-chip:hover {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--primary-glow);
        }
        .collection-chip-cover {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid transparent;
            transition: all var(--transition-fast);
        }
        .collection-chip:hover .collection-chip-cover {
            border-color: rgba(255, 255, 255, 0.5);
        }
        .collection-chip-name {
            font-size: 0.88em;
            white-space: nowrap;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        .collection-chip-count {
            font-size: 0.75em;
            color: var(--text-tertiary);
            transition: color var(--transition-fast);
        }
        .collection-chip:hover .collection-chip-count {
            color: rgba(255, 255, 255, 0.7);
        }

        /* ========== 文章卡片瀑布流 ========== */
        #docList {
            column-count: 5;
            column-gap: 16px;
            margin-top: 6px;
            max-width: 100%;
        }
        @media (min-width: 1600px) {
            #docList {
                column-count: 6;
                column-gap: 18px;
            }
        }
        @media (min-width: 2000px) {
            #docList {
                column-count: 7;
                column-gap: 20px;
            }
        }
        
        .doc-card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-card);
            transition: all var(--transition-smooth);
            break-inside: avoid;
            margin-bottom: 18px;
            position: relative;
        }
        .doc-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-card-hover);
            border-color: var(--primary-light);
        }
        .doc-card:hover::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--card-radius);
            box-shadow: inset 0 0 0 1px var(--primary-glow);
            pointer-events: none;
            z-index: 2;
        }
        .doc-card-img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform var(--transition-smooth);
        }
        .doc-card:hover .doc-card-img {
            transform: scale(1.03);
        }
        .doc-card-placeholder {
            width: 100%;
            aspect-ratio: 16/10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-soft) 0%, var(--card-bg) 50%, var(--bg-soft) 100%);
            color: var(--text-secondary);
            font-size: 1.1em;
            font-weight: 700;
            padding: 24px;
            text-align: center;
            line-height: 1.5;
            border-bottom: 1px solid var(--border-light);
            letter-spacing: 0.04em;
            position: relative;
        }
        .doc-card-placeholder::before {
            content: '📖';
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 1.3em;
            opacity: 0.4;
        }
        .doc-card-info {
            padding: 12px 14px;
        }
        .doc-card-author {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .doc-card-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72em;
            font-weight: 700;
            flex-shrink: 0;
            object-fit: cover;
            border: 1.5px solid var(--border-light);
        }
        .doc-card-author-name {
            font-size: 0.8em;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
        }
        .role-badge {
            font-size: 0.68em;
            margin-left: 3px;
            border-radius: 4px;
            padding: 2px 7px;
            font-weight: 600;
            white-space: nowrap;
            letter-spacing: 0.04em;
        }
        .role-badge.owner {
            background: #c0392b;
            color: #f1c40f;
        }
        .role-badge.dojin {
            background: #e67e22;
            color: #fff;
        }

        .loader .text:nth-child(6) {
            clip-path: polygon(55.55% 0%, 66.66% 0%, 66.66% 100%, 55.55% 100%);

        .loader .text:nth-child(7) {
            clip-path: polygon(66.66% 0%, 77.77% 0%, 77.77% 100%, 66.66% 100%);

        .loader .text span {

        .loader .text:nth-child(1) span {

        .loader .text:nth-child(2) span {

        .loader .text:nth-child(3) span {

        .loader .text:nth-child(4) span {

            -webkit-background-clip: text;
            background-clip: text;

        .loader .text:nth-child(6) span {
            background: linear-gradient(to right, var(--shadow-color) 29%, var(--text-color) 32%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .loader .text:nth-child(7) span {
            background: linear-gradient(to right, var(--shadow-color) 34%, var(--text-color) 37%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .loader .text:nth-child(8) span {
            background: linear-gradient(to right, var(--shadow-color) 39%, var(--text-color) 42%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;

        .loader .text:nth-child(9) span {

        .loader .line {

        #loadingOverlay {

            box-shadow: 0 4px 3px 1px #FCFCFC, 0 6px 8px #D6D7D9, 0 -4px 4px #CECFD1, 0 -6px 4px #FEFEFE, inset 0 0 3px 3px #CECFD1;
            transform: translateY(-2px);

        .basic-btn:focus {
            box-shadow: 0 4px 3px 1px #FCFCFC, 0 6px 8px #D6D7D9, 0 -4px 4px #CECFD1, 0 -6px 4px #FEFEFE, inset 0 0 5px 3px #999, inset 0 0 30px #aaa;

            background-image: linear-gradient(to top, #D8D9DB 0%, #fff 80%, #FDFDFD 100%) !important;

        .gh-btn {

            height: 40px;

            justify-content: center;
            border: none !important;
            background-color: transparent !important;
            padding: 0 !important;
            font: inherit !important;
            position: relative;
            border-radius: 10px;
            cursor: pointer;
            transition: all .3s;
            flex-shrink: 0;

        .gh-btn .svgContainer {

    <script>
        const themeCheckbox = document.getElementById('themeCheckbox');

        function initTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            themeCheckbox.checked = isDark;
        }
        themeCheckbox.addEventListener('change', function(e) {
            document.body.classList.toggle('dark-mode', this.checked);
            localStorage.setItem('theme', this.checked ? 'dark' : 'light');
        });
        initTheme();

        /* ---- 兼容性 polyfill ---- */
        (function(){if(!NodeList.prototype.forEach)NodeList.prototype.forEach=Array.prototype.forEach;if(!Array.prototype.includes)Array.prototype.includes=function(e){return this.indexOf(e)!==-1};if(!String.prototype.endsWith)String.prototype.endsWith=function(s){return this.length>=s.length&&this.indexOf(s,this.length-s.length)!==-1};if(!String.prototype.startsWith)String.prototype.startsWith=function(s){return this.indexOf(s)===0}})();

        /* ---- Service Worker（PWA） ---- */
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(function(reg) {
                console.log('SW registered:', reg.scope);
            }).catch(function(err) {
                console.log('SW registration failed:', err);
            });
        }

        let currentUser = null;

        window.onload = async function() {
            currentUser = await checkLogin();
            if (!currentUser) return;
            initEditor();
            await load();
            const overlay = document.getElementById('loadingOverlay');
            const elementsToFadeIn = document.querySelectorAll('body > .toolbar, body > .status-bar, .EasyMDEContainer');
            const MIN_LOADING_TIME = 700;
            const startTime = performance.now();
            const elapsed = performance.now() - startTime;
            const remaining = Math.max(0, MIN_LOADING_TIME - elapsed);
            setTimeout(() => {
                overlay.style.opacity = '0';
                elementsToFadeIn.forEach(el => el.style.opacity = '1');
                setTimeout(() => {
                    if (overlay && overlay.parentNode) {
                        overlay.parentNode.removeChild(overlay);
                    }
                }, 400);
            }, remaining);
        }

        function authFetch(url, options) {
            if (!options) options = {};
            var headers = {};
            // 兼容复制 headers
            if (options.headers) {
                var origHeaders = options.headers;
                if (typeof origHeaders === 'object') {
                    var keys = Object.keys(origHeaders);
                    for (var i = 0; i < keys.length; i++) {
                        headers[keys[i]] = origHeaders[keys[i]];
                    }
                }
            }
            var token = localStorage.getItem('token');
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }
            var fetchOpts = {
                method: options.method || 'GET',
                headers: headers
            };
            if (options.body != null) fetchOpts.body = options.body;
            // 放弃 AbortSignal.timeout（旧 Chrome 不支持），用 AbortController + Promise.race
            var controller = new AbortController();
            var timeoutId = setTimeout(function() { controller.abort(); }, 15000);
            fetchOpts.signal = controller.signal;
            var fetchPromise = fetch(url, fetchOpts);
            var timeoutPromise = new Promise(function(resolve, reject) {
                setTimeout(function() { reject(new Error('请求超时')); }, 15000);
            });
            return Promise.race([fetchPromise, timeoutPromise])
                .then(function(v) { clearTimeout(timeoutId); return v; }, function(e) { clearTimeout(timeoutId); throw e; });
        }

        let hideRequested = false;
        const PAGE_LOAD_TIME = Date.now();

        function checkLogin() {
            return new Promise(function(resolve) {
                const stored = localStorage.getItem('currentUser');
                if (!stored) {
                    hideLoadingOverlay();
                    showAuth();
                    currentUser = null;
                    resolve(null);
                    return;
                }
                try {
                    currentUser = null;
                    hideLoadingOverlay();
                    authFetch('/api/current_user')
                        .then(res => {
                            if (res.status === 401) {
                                localStorage.removeItem('token');
                                localStorage.removeItem('currentUser');
                                currentUser = null;
                                showAuth();
                                resolve(null);
                                return null;
                            }
                            return res.json();
                        })
                        .then(data => {
                            if (!data) {
                                resolve(null);
                                return;
                            }
                            if (data.user) {
                                currentUser = data.user;
                                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                                try {
                                    showMain();
                                    if (Notification.permission === 'default') Notification
                                        .requestPermission();
                                    if (currentUser && currentUser.role === 'owner')
                                        ensureAdminBtn();
                                } catch (e) {
                                    console.error('UI init error:', e);
                                }
                                resolve(currentUser);
                            } else {
                                localStorage.removeItem('token');
                                localStorage.removeItem('currentUser');
                                currentUser = null;
                                showAuth();
                                resolve(null);
                            }
                        }).catch((e) => {
                            console.error('Auth check failed:', e);
                            localStorage.removeItem('token');
                            localStorage.removeItem('currentUser');
                            currentUser = null;
                            showAuth();
                            resolve(null);
                        });
                } catch (e) {
                    showAuth();
                    currentUser = null;
                    resolve(null);
                }
            });
        }

        function showAuth() {
            document.getElementById('authView').classList.remove('hidden');
            document.getElementById('mainView').classList.add('hidden');
        }

        var msgBadgeTimer = null;

        function startMsgBadgePolling() {
            if (msgBadgeTimer) clearInterval(msgBadgeTimer);
            msgBadgeTimer = setInterval(updateMsgBadge, 10000);
        }

        function showMain() {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
            updateNavbar();
            loadDocList();
            loadCollectionBar();
            updateMsgBadge();
            startMsgBadgePolling();
        }

        function showProfile() {
            location.href = '/profile';
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            location.href = '/';
        }

        function updateNavbar() {
            if (currentUser) {
                document.getElementById('displayNickname').innerText = currentUser.nickname;
                const avatarCont = document.getElementById('avatarContainer');
                if (currentUser.avatar) {
                    avatarCont.innerHTML =
                        `<img src="/avatars/${currentUser.avatar}" class="avatar" style="cursor:pointer;">`;
                } else {
                    avatarCont.innerHTML =
                        `<div class="avatar-placeholder" style="cursor:pointer;">${currentUser.nickname.charAt(0).toUpperCase()}</div>`;
                }
                avatarCont.onclick = showProfile;
            }
        }

        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const isLogin = this.dataset.tab === 'login';
                document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
                document.getElementById('registerForm').classList.toggle('hidden', isLogin);
            });
        });

        function handleLogin() {
            var username = document.getElementById('loginUsername').value.trim();
            var password = document.getElementById('loginPassword').value;
            if (!username || !password) { alert('请输入用户名和密码'); return; }
            var formBody = 'username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password);
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/login', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.onreadystatechange = function() {
                if (xhr.readyState !== 4) return;
                document.getElementById('authError').innerText = '';
                var data;
                try { data = JSON.parse(xhr.responseText); } catch(e) {
                    document.getElementById('authError').innerText = '服务器错误(' + xhr.status + ')';
                    return;
                }
                if (data.status === 'ok') {
                    currentUser = data.user;
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showMain();
                    if (Notification.permission === 'default') Notification.requestPermission();
                    if (currentUser && currentUser.role === 'owner') ensureAdminBtn();
                } else {
                    document.getElementById('authError').innerText = data.message;
                }
            };
            xhr.onerror = function() {
                document.getElementById('authError').innerText = '网络错误，请检查连接';
            };
            xhr.send(formBody);
        }

        function handleRegister() {
            var username = document.getElementById('regUsername').value.trim();
            var nickname = document.getElementById('regNickname').value.trim();
            var password = document.getElementById('regPassword').value;
            if (!username || !nickname || !password) { alert('请完整填写'); return; }
            var formBody = 'username=' + encodeURIComponent(username) + '&nickname=' + encodeURIComponent(nickname) + '&password=' + encodeURIComponent(password);
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/register', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.onreadystatechange = function() {
                if (xhr.readyState !== 4) return;
                document.getElementById('authError').innerText = '';
                var data;
                try { data = JSON.parse(xhr.responseText); } catch(e) {
                    document.getElementById('authError').innerText = '服务器错误(' + xhr.status + ')';
                    return;
                }
                if (data.status === 'ok') {
                    alert('注册成功，请登录');
                    document.querySelector('[data-tab="login"]').click();
                } else {
                    document.getElementById('authError').innerText = data.message;
                }
            };
            xhr.onerror = function() {
                document.getElementById('authError').innerText = '网络错误，请检查连接';
            };
            xhr.send(formBody);
        }

        function getAvatarHtml(author, avatars) {
            if (!author) return '<div class="doc-card-avatar">?</div>';
            var avFile = avatars && avatars[author];
            if (avFile) {
                return '<img class="doc-card-avatar" src="/avatars/' + avFile + '">';
            }
            return '<div class="doc-card-avatar">' + author.charAt(0).toUpperCase() + '</div>';
        }

        function roleBadgeHtml(roles, author) {
            var role = (roles || {})[author];
            var html = '';
            if (role === 'owner' || role === 'owner_dojin') html +=
                '<span class="role-badge owner">站长</span>';
            if (role === 'admin' || role === 'admin_dojin') html +=
            '<span class="role-badge admin">管理员</span>';
            if (role && role.indexOf('_dojin') !== -1) html += '<span class="role-badge dojin">同人</span>';
            return html;
        }

        function renderCard(item) {
            var title = item.title || item.id;
            var author = (item.authors || [])[0] || '';
            var avatars = item.author_avatars || {};
            var roles = item.author_roles || {};
            var cover = item.cover_thumb || item.cover || '';
            var coverHtml = cover ?
                '<img class="doc-card-img" src="' + cover + '" alt="' + title + '" loading="lazy">' :
                '<div class="doc-card-placeholder"><span>' + title + '</span></div>';
            return '<div class="doc-card" onclick="location.href=\'/read/' + item.id + '\'">' +
                coverHtml +
                '<div class="doc-card-info">' +
                '<div class="doc-card-author">' + getAvatarHtml(author, avatars) +
                '<span class="doc-card-author-name">' + author + '</span></div>' +
                '<div class="doc-card-title">' + title + '</div>' +
                '<div class="doc-card-meta"><span>#' + item.number + '</span></div>' +
                '</div></div>';
        }

        var _currentSort = 'updated';

        function setSort(sort) {
            _currentSort = sort;
            document.querySelectorAll('.sort-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.sort === sort);
            });
            loadDocList();
        }

        async function loadDocList() {
            const res = await authFetch('/api/docs?sort=' + _currentSort);
            const docs = await res.json();
            var html = docs.map(renderCard).join('');
            document.getElementById('docList').innerHTML = html || '<p style="text-align:center;opacity:0.6;padding:40px;">暂无文章</p>';
        }

        async function loadCollectionBar() {
            try {
                const res = await fetch('/api/collections');
                const cols = await res.json();
                var bar = document.getElementById('collectionBar');
                var section = document.getElementById('collectionSection');
                if (!cols.length) { section.style.display = 'none'; return; }
                section.style.display = 'block';
                bar.innerHTML = cols.map(function(c) {
                    var imgHtml = c.cover ? '<img class="collection-chip-cover" src="' + (c.cover_thumb || c.cover) +
                        '">' : '';
                    return '<div class="collection-chip" onclick="location.href=\'/collections/' + c.id +
                        '\'">' + imgHtml + '<span class="collection-chip-name">' + c.name +
                        '</span></div>';
                }).join('');
            } catch (e) {
                document.getElementById('collectionSection').style.display = 'none';
            }
        }

        async function toggleDrafts() {
            if (!currentUser) { alert('请先登录'); return; }
            const section = document.getElementById('draftsSection');
            const list = document.getElementById('draftList');
            if (!section || !list) return;
            if (section.style.display === 'block') {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';
            list.innerHTML = '<p>加载中...</p>';
            try {
                const res = await authFetch('/api/my_drafts');
                const drafts = await res.json();
                if (!Array.isArray(drafts) || drafts.length === 0) {
                    list.innerHTML = '<p>暂无草稿</p>';
                } else {
                    list.innerHTML = drafts.map(d =>
                        `<button class="basic-btn" onclick="location.href='/edit/${d.id}'" style="opacity:0.85;margin:4px;">📝 #${d.number} ${d.title}</button>`
                    ).join('');
                }
            } catch (e) {
                list.innerHTML = '<p style="color:red;">加载失败，请刷新重试</p>';
            }
        }
        window.toggleDrafts = toggleDrafts;

        function createNewDoc() {
            authFetch('/api/create_doc', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ docId: '' })
                })
                .then(r => r.json())
                .then(data => { window.location.href = `/edit/${data.doc_id}`; })
                .catch(() => alert('创建失败，请刷新重试'));
        }

        async function updateNotiBadge(customCount) {
            if (!currentUser) return;
            const cnt = customCount !== undefined ? customCount : (await authFetch('/api/notifications/count', {
                headers: { 'X-Username': currentUser.username }
            }).then(r => r.json())).count;
            const badge = document.getElementById('notiBadge');
            badge.textContent = cnt || 0;
            badge.style.display = cnt > 0 ? 'flex' : 'none';
        }

        async function updateMsgBadge() {
            if (!currentUser) return;
            try {
                const res = await authFetch('/api/messages/unread_count');
                const data = await res.json();
                const badge = document.getElementById('msgBadge');
                if (badge) {
                    badge.textContent = data.count || 0;
                    badge.style.display = data.count > 0 ? 'flex' : 'none';
                }
            } catch(e) {}
        }

        async function loadNotifications() {
            if (!currentUser) return;
            const res = await authFetch('/api/notifications', {
                headers: { 'X-Username': currentUser.username }
            });
            const notis = await res.json();
            document.getElementById('notiList').innerHTML = notis.length ? notis.map(n => `
                <div class="noti-item ${n.read?'':'unread'}" onclick="markReadAndGo('${n.id}','${n.doc_id}','${n.comment_id||''}')">
                    ${n.from_avatar ? `<img src="/avatars/${n.from_avatar}" class="noti-avatar">` : `<div class="noti-avatar" style="width:36px;height:36px;border-radius:50%;background:var(--avatar-bg);display:flex;align-items:center;justify-content:center;font-weight:700;">${n.from_user?.charAt(0)||'?'}</div>`}
                    <div class="noti-content"><strong>${n.from_user}</strong> ${n.type==='reply'?'回复了你':'赞了你的评论'}<div>${n.content||''}</div><div class="noti-time">${new Date(n.timestamp).toLocaleString()}</div></div>
                </div>`).join('') : '<div class="noti-empty">暂无通知</div>';
        }

        window.toggleNotiDropdown = () => {
            const dd = document.getElementById('notiDropdown');
            if (dd.style.display === 'block') dd.style.display = 'none';
            else { loadNotifications();
                dd.style.display = 'block'; }
        };

        window.markAllRead = async () => {
            if (!currentUser) return;
            await authFetch('/api/notifications/read', {
                method: 'POST',
                headers: { 'X-Username': currentUser.username }
            });
            updateNotiBadge(0);
            loadNotifications();
        };

        window.markReadAndGo = async (notiId, docId, commentId) => {
            if (currentUser && notiId) {
                let readList = JSON.parse(localStorage.getItem('readNotis') || '[]');
                if (!readList.includes(notiId)) { readList.push(notiId);
                    localStorage.setItem('readNotis', JSON.stringify(readList)); }
                updateMsgBadge();
            }
            if (docId) window.location.href = commentId ? `/read/${docId}#comment-${commentId}` :
                `/read/${docId}`;
        };

        function showToast(title, content) {
            const toast = document.createElement('div');
            toast.style.cssText =
                'position:fixed;top:20px;right:20px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px 18px;box-shadow:var(--shadow-lg);z-index:9999;animation:toastSlideIn .3s ease;font-family:inherit;';
            toast.innerHTML =
                `<strong style="color:var(--primary-dark)">${title}</strong><div style="margin-top:4px;color:var(--text-secondary);">${content}</div>`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'toastSlideOut .3s ease';
                setTimeout(() => toast.remove(), 300); }, 3000);
        }

        checkLogin();

        function hideLoadingOverlay() {
            hideRequested = true;
            const elapsed = Date.now() - PAGE_LOAD_TIME;
            const remaining = Math.max(0, 1000 - elapsed);
            setTimeout(function() {
                const overlay = document.getElementById('loadingOverlay');
                if (!overlay || overlay.style.display === 'none') return;
                overlay.style.opacity = "0";
                setTimeout(function() { overlay.style.display = "none"; }, 300);
            }, remaining);
        }

        let searchTimer = null;

        function search() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(doSearch, 300);
        }
        async function doSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) { loadDocList(); return; }
            const list = document.getElementById('docList');
            list.innerHTML = '<p style="text-align:center;opacity:0.6;padding:30px;">搜索中...</p>';
            try {
                var [articlesRes, usersRes] = await Promise.all([
                    authFetch('/api/search?q=' + encodeURIComponent(q)),
                    fetch('/api/search/users?q=' + encodeURIComponent(q))
                ]);
                var articles = await articlesRes.json();
                var users = await usersRes.json();
                var html = '';
                if (users.length > 0) {
                    html += '<div class="search-section-label"><h3>👤 作者</h3></div>';
                    for (var ui = 0; ui < users.length; ui++) {
                        var u = users[ui];
                        var uName = u.nickname || u.username;
                        var avFile = u.avatar;
                        var avHtml = avFile ?
                            '<img class="search-user-avatar" src="/avatars/' + avFile + '">' :
                            '<div class="search-user-avatar placeholder">' + uName.charAt(0).toUpperCase() +
                            '</div>';
                        html += '<div class="search-user-card" onclick="location.href=\'/user/' +
                            encodeURIComponent(u.username) + '\'">' +
                            avHtml +
                            '<div class="search-user-info">' +
                            '<div class="search-user-name">' + uName + '</div>' +
                            '<div class="search-user-username">@' + u.username + '</div>' +
                            '</div></div>';
                    }
                }
                if (articles.length > 0) {
                    html += '<div class="search-section-label"><h3>📄 文章</h3></div>';
                    for (var si = 0; si < articles.length; si++) {
                        var item = articles[si];
                        var title = item.title || item.id;
                        var author = (item.authors || [])[0] || '';
                        var avatars = item.author_avatars || {};
                        var roles = item.author_roles || {};
                        var cover = item.cover_thumb || item.cover || '';
                        var coverHtml = cover ?
                            '<img class="doc-card-img" src="' + cover + '" alt="' + title +
                            '" loading="lazy">' :
                            '<div class="doc-card-placeholder"><span>' + title + '</span></div>';
                        html += '<div class="doc-card" onclick="location.href=\'/read/' + item.id +
                            '\'">' +
                            coverHtml +
                            '<div class="doc-card-info">' +
                            '<div class="doc-card-author">' + getAvatarHtml(author, avatars) +
                            '<span class="doc-card-author-name">' + author + '</span></div>' +
                            '<div class="doc-card-title">' + title + '</div>' +
                            '<div class="doc-card-meta"><span>#' + item.number + '</span></div>' +
                            '</div></div>';
                    }
                }
                if (!users.length && !articles.length) {
                    html = '<p style="text-align:center;opacity:0.6;padding:40px;">未找到相关结果</p>';
                }
                list.innerHTML = html;
            } catch (e) {
                list.innerHTML = '<p style="color:red;text-align:center;">搜索失败，请重试</p>';
            }
        }
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { clearTimeout(searchTimer);
                        doSearch(); }
                });
            }
        });

        setTimeout(function() {
            hideLoadingOverlay();
        }, 4000);

        let collectionPickDocId = null;

        async function showCollectionPicker(docId) {
            if (!currentUser) { alert('请先登录'); return; }
            collectionPickDocId = docId;
            const modal = document.getElementById('collectionPickerModal');
            if (!modal) return;
            modal.style.display = 'flex';
            const list = document.getElementById('collectionPickerList');
            list.innerHTML = '<p>加载中...</p>';
            const res = await authFetch('/api/my_collections');
            const collections = await res.json();
            if (collections.length === 0) {
                list.innerHTML = `
                    <p style="opacity:0.7;">你还没有创建合集</p>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                        <input id="newCollectionName" type="text" placeholder="合集名称" class="input" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--bg-soft);color:var(--text);min-width:140px;">
                        <button class="basic-btn" onclick="createAndAddCollection()" style="white-space:nowrap;">+ 创建并加入</button>
                    </div>
                `;
                return;
            }
            list.innerHTML = collections.map(c => `
                <div onclick="addToCollection('${c.id}')" style="padding:14px 16px;border:1px solid var(--border-light);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;background:var(--card-bg);" onmouseover="this.style.background='var(--bg-soft)';this.style.borderColor='var(--primary-light)';" onmouseout="this.style.background='var(--card-bg)';this.style.borderColor='var(--border-light)';">
                    <div style="font-weight:600;color:var(--text);">${c.name}</div>
                    <div style="font-size:0.82em;opacity:0.7;color:var(--text-tertiary);">${c.article_count || 0} 篇文章</div>
                </div>
            `).join('');
        }

        async function createAndAddCollection() {
            const name = document.getElementById('newCollectionName').value.trim();
            if (!name) { alert('请填写合集名称'); return; }
            const res = await authFetch('/api/collections', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (data.status === 'ok') {
                await addToCollection(data.collection_id);
            } else {
                alert(data.message || '创建失败');
            }
        }

        async function addToCollection(collectionId) {
            const docId = collectionPickDocId;
            if (!docId) return;
            const res = await authFetch('/api/collections/' + collectionId + '/articles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ doc_id: docId })
            });
            const data = await res.json();
            if (data.status === 'ok') {
                showToast('已加入合集', '✅ 成功');
                document.getElementById('collectionPickerModal').style.display = 'none';
            } else {
                alert(data.message);
            }
        }
    </script>

    <script>
        var pickerModal = document.getElementById('collectionPickerModal');
        if (pickerModal) {
            pickerModal.addEventListener('click', function(e) {
                if (e.target === this) this.style.display = 'none';
            });
        }

        function showAdminPanel() {
            var panel = document.getElementById('adminPanel');
            var shown = panel.style.display === 'block';
            panel.style.display = shown ? 'none' : 'block';
            if (!shown) loadUserListForAdmin();
        }

        async function loadUserListForAdmin() {
            var list = document.getElementById('adminUserList');
            list.innerHTML = '<p style="opacity:0.7;">加载中...</p>';
            try {
                var res = await authFetch('/api/admin/user_list');
                var data = await res.json();
                if (data.users) {
                    list.innerHTML = data.users.map(function(u) {
                        var badge = '';
                        if (u.role === 'owner') badge =
                            '<span class="role-badge owner">站长</span>';
                        else if (u.role === 'admin') badge =
                            '<span class="role-badge admin">管理员</span>';
                        var dojinBtn = u.is_dojin ?
                            '<button class="basic-btn" style="min-width:60px;" onclick="toggleDojin(\'' +
                            u.username + '\', false)">取消同人</button>' :
                            '<button class="basic-btn" style="min-width:60px;" onclick="toggleDojin(\'' +
                            u.username + '\', true)">设为同人</button>';
                        return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-light);">' +
                            '<span>' + u.nickname + ' (@' + u.username + ')' + badge + (u
                                .is_dojin ?
                                '<span class="role-badge dojin">同人</span>' : '') + '</span>' +
                            '<span style="margin-left:auto;">' + dojinBtn + '</span>' +
                            '</div>';
                    }).join('');
                }
            } catch (e) {
                list.innerHTML = '<p style="color:red;">加载失败</p>';
            }
        }

        function ensureAdminBtn() {
            if (document.getElementById('adminBtn')) return;
            var ghBtn = document.querySelector('.gh-btn');
            if (!ghBtn) return;
            var btn = document.createElement('button');
            btn.id = 'adminBtn';
            btn.className = 'basic-btn';
            btn.textContent = '管理';
            btn.onclick = showAdminPanel;
            ghBtn.parentNode.insertBefore(btn, ghBtn.nextSibling);
        }

        function toggleDojin(targetUsername, setDojin) {
            authFetch('/api/admin/set_dojin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: targetUsername, action: setDojin ? 'set' : 'unset' })
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.status === 'ok') {
                    loadUserListForAdmin();
                } else {
                    alert(data.message || '操作失败');
                }
            }).catch(function() { alert('网络错误'); });
        }
    </script>
</body>
</html>
