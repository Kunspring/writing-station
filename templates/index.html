<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>末日回响写作站</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        :root {
            --bg: #fdf6ee;
            --card-bg: #fffbf5;
            --text: #2d2418;
            --border: #e8ddd0;
            --primary: #d4a574;
            --primary-hover: #c4915a;
            --secondary: #a09080;
            --secondary-hover: #8a7a6a;
            --shadow: rgba(180,140,100,0.08);
            --noti-bg: #fffbf5;
            --comment-highlight: rgba(212,165,116,0.10);
            --search-bg: #f5ede2;
            --search-glow: rgba(212,165,116,0.10);
            --bell-bg: #fffbf5;
            --bell-icon: #a09080;
            --bell-gradient-start: #d4a574;
            --bell-gradient-end: #5ce1e6;
            --avatar-bg: #f5ede2;
        }
        body > .toolbar,
        body > .status-bar,
        .EasyMDEContainer {
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        body.dark-mode {
            --bg: #1e1814;
            --card-bg: #2a221c;
            --text: #ffffff;
            --border: #3a3028;
            --primary: #d4a574;
            --primary-hover: #c4915a;
            --secondary: #8a7a6a;
            --secondary-hover: #a09080;
            --shadow: rgba(0,0,0,0.3);
            --noti-bg: #2a221c;
            --search-bg: #2a221c;
            --search-glow: rgba(212,165,116,0.15);
            --bell-bg: #2a221c;
            --bell-icon: #a09080;
            --bell-gradient-start: #d4a574;
            --bell-gradient-end: #e8c9a0;
            --avatar-bg: #3a3028;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; scrollbar-width: none !important; }
        ::-webkit-scrollbar, *::-webkit-scrollbar { display: none !important; }
        body {
            font-family: 'Noto Serif SC', 'SimSun', 'STSong', '宋体', serif;
            font-weight: 500;
            max-width: 100%; margin: 0; padding: 16px 24px; background: var(--bg);
            line-height: 1.6; color: var(--text);
            transition: background 0.3s, color 0.3s;
        }
        h1, h2, h3 { font-weight: 700; }
        h1 { border-bottom: 2px solid var(--border); font-size: 1.8em; }
        .hidden { display: none !important; }
        .auth-container {
            max-width: 400px; margin: 30px auto; background: var(--card-bg); padding: 24px;
            border-radius: 12px; box-shadow: 0 4px 12px var(--shadow);
        }
        .auth-tabs { display: flex; margin-bottom: 20px; }
        .auth-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-bottom: 2px solid transparent; font-weight: 600; color: var(--text); }
        .auth-tab.active { border-bottom-color: var(--primary); color: var(--primary); }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--text); font-weight: 600; }
        .form-group input {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px;
            font-size: 16px; font-family: inherit; background: var(--card-bg); color: var(--text);
        }
        button {
            padding: 12px 20px; background: var(--primary); color: white; border: none;
            border-radius: 8px; cursor: pointer; font-size: 16px; font-family: inherit;
            font-weight: 600; transition: background 0.2s; outline: none;
        }
        button:hover { background: var(--primary-hover); }
        .basic-btn:hover { background: linear-gradient(to top, #D8D9DB 0%, #fff 80%, #FDFDFD 100%) !important; }
        .error-message { color: #e74c3c; margin-top: 12px; }
        
        .navbar {
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
        }
        .navbar h1 { border: none; margin: 0; font-size: 1.6em; }
        .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .avatar, .noti-avatar, .profile-avatar, .avatar-placeholder { 
            width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
            flex-shrink: 0; border: 1px solid var(--border);
        }
        .avatar, .noti-avatar, .profile-avatar { background: var(--avatar-bg); }
        .avatar-placeholder {
            background: var(--primary); color: white; display: flex; 
            align-items: center; justify-content: center; font-weight: 700; font-size: 1.2em;
        }
        .nav-links { display: flex; gap: 12px; align-items: center; }
        .nav-links button { padding: 8px 16px; font-size: 14px; background: var(--secondary); }
        .nav-links button:hover { background: var(--secondary-hover); }

        .notification-wrapper { position: relative; display: inline-block; }
        .noti-bell {
            position: relative; width: 40px; height: 40px; background: var(--bell-bg);
            border-radius: 40px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 8px rgba(180,140,100,0.08); transition: all 0.4s ease; border: none; padding: 0; outline: none; overflow: hidden;
        }
        .noti-bell:hover { opacity: 0.8; }
        .bell-icon { font-size: 1.5em; color: var(--bell-icon); }
        
        .noti-badge { position: absolute; top: 2px; right: 2px; background: #e74c3c; color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; display: flex; align-items: center; justify-content: center; z-index: 5; pointer-events: none; transition: all 0.3s; }
        .noti-bell:hover .noti-badge { right: 8px; top: 50%; transform: translateY(-50%); }
        .noti-dropdown { position: absolute; right: 0; top: 48px; width: 320px; max-width: 90vw; background: var(--noti-bg); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 999; display: none; max-height: 400px; overflow-y: auto; }
        .noti-header { padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: 600; }
        .noti-item { padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
        .noti-item.unread { background: var(--comment-highlight); }
        .noti-item img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .noti-content { flex: 1; font-size: 0.9em; }
        .noti-time { font-size: 0.8em; opacity: 0.7; margin-top: 4px; }
        .noti-empty { padding: 20px; text-align: center; opacity: 0.7; }


        .switch {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            font-size: 17px;
            display: inline-block;
            width: 3.5em;
            height: 2em;
            transform-style: preserve-3d;
            perspective: 500px;
            animation: toggle__animation 3s infinite;
        }
        .switch::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            filter: blur(20px);
            z-index: -1;
            border-radius: 50px;
            background-color: #d8ff99;
            background-image: radial-gradient(at 21% 46%, hsla(183,65%,60%,1) 0px, transparent 50%),
            radial-gradient(at 23% 25%, hsla(359,74%,70%,1) 0px, transparent 50%),
            radial-gradient(at 20% 1%, hsla(267,83%,75%,1) 0px, transparent 50%),
            radial-gradient(at 86% 87%, hsla(204,69%,68%,1) 0px, transparent 50%),
            radial-gradient(at 99% 41%, hsla(171,72%,77%,1) 0px, transparent 50%),
            radial-gradient(at 55% 24%, hsla(138,60%,62%,1) 0px, transparent 50%);
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #fdfefedc;
            transition: .4s;
            border-radius: 30px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 1.4em;
            width: 1.4em;
            left: 0.3em;
            bottom: 0.35em;
            transition: .4s;
            border-radius: 50%;
            box-shadow: rgba(0, 0, 0, 0.17) 0px -10px 10px 0px inset,
                 rgba(0, 0, 0, 0.09) 0px -1px 15px -8px;
            background-color: #ff99fd;
            background-image: radial-gradient(at 81% 39%, hsla(327,79%,79%,1) 0px, transparent 50%),
            radial-gradient(at 11% 72%, hsla(264,64%,79%,1) 0px, transparent 50%),
            radial-gradient(at 23% 20%, hsla(75,98%,71%,1) 0px, transparent 50%);
        }
        .input__check:checked + .slider {
            background-color: #17202A;
        }
        .input__check:checked + .slider:before {
            transform: translateX(1.5em);
        }
        @keyframes toggle__animation {
            0%, 100% { transform: translateY(-10px) rotateX(15deg) rotateY(-20deg); }
            50% { transform: translateY(0px) rotateX(15deg) rotateY(-20deg); }
        }

        #collectionSection { margin-bottom:20px; }
        #collectionSection h3 { color:var(--text); margin-bottom:8px; font-size:1em; font-weight:600; }
        #collectionBar { display:flex; gap:12px; overflow-x:auto; padding:8px 0; scrollbar-width:thin; }
        #collectionBar::-webkit-scrollbar { height:4px; }
        #collectionBar::-webkit-scrollbar-thumb { background:var(--primary); border-radius:4px; }
        .collection-chip { flex-shrink:0; display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:20px; border:1px solid var(--border); background:var(--card-bg); cursor:pointer; transition:all .2s; }
        .collection-chip:hover { border-color:var(--primary); background:var(--primary); color:white; }
        .collection-chip-cover { width:28px; height:28px; border-radius:50%; object-fit:cover; }
        .collection-chip-name { font-size:0.85em; white-space:nowrap; font-weight:500; }
        .collection-chip-count { font-size:0.75em; color:var(--secondary); }
        .collection-chip:hover .collection-chip-count { color:rgba(255,255,255,0.7); }
        #docList { column-count: 5; column-gap: 14px; margin-top: 0; max-width: 100%; }
        @media (min-width: 1600px) { #docList { column-count: 6; } }
        @media (min-width: 2000px) { #docList { column-count: 7; } }
        .doc-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); box-shadow: 0 2px 8px var(--shadow); transition: transform 0.2s, box-shadow 0.2s; break-inside: avoid; margin-bottom: 16px; }
        .doc-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); }
        .doc-card-img { width: 100%; height: auto; display: block; }
        .doc-card-placeholder { width: 100%; aspect-ratio: 16/10; display: flex; align-items: center; justify-content: center; background: var(--card-bg); color: var(--text); font-size: 1.3em; font-weight: 900; padding: 20px; text-align: center; line-height: 1.4; border-bottom: 1px solid var(--border); }

        /* GitHub 按钮 */
        .gh-btn {
            width: 40px; height: 40px;
            display: inline-flex; align-items: center; justify-content: center;
            border: none !important; background-color: transparent !important;
            padding: 0 !important; font: inherit !important;
            position: relative; border-radius: 7px; cursor: pointer;
            transition: all .3s; flex-shrink: 0; color: inherit !important;
            text-decoration: none;
        }
        .gh-btn .svgContainer {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background-color: transparent; backdrop-filter: blur(0px);
            letter-spacing: 0.8px; border-radius: 10px;
            transition: all .3s;
            border: 1px solid rgba(156,156,156,0.466);
        }
        .gh-btn .BG {
            position: absolute; content: "";
            width: 100%; height: 100%;
            background: #181818; z-index: -1;
            border-radius: 10px; pointer-events: none;
            transition: all .3s;
        }
        .gh-btn:hover .BG {
            transform: rotate(35deg);
            transform-origin: bottom;
        }
        .gh-btn:hover .svgContainer {
            background-color: rgba(156,156,156,0.466);
            backdrop-filter: blur(4px);
        }
        .doc-card-info { padding: 10px 12px; }
        .sort-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
        .sort-btn { padding: 4px 10px; font-size: 0.8em; border: 1px solid var(--border); border-radius: 14px; background: var(--card-bg); color: var(--secondary); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .sort-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .sort-btn:hover:not(.active) { background: var(--hover-bg); }
        .search-section-label { margin: 12px 0 8px; }
        .search-section-label h3 { margin: 0; font-size: 1em; color: var(--secondary); }
        .search-user-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: background 0.2s; }
        .search-user-card:hover { background: var(--hover-bg); }
        .search-user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.85em; font-weight: 700; flex-shrink: 0; object-fit: cover; }
        .search-user-info { flex: 1; min-width: 0; }
        .search-user-name { font-weight: 600; color: var(--text); font-size: 0.9em; }
        .search-user-username { font-size: 0.8em; color: var(--secondary); }
        .doc-card-author { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .doc-card-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.7em; font-weight: 700; flex-shrink: 0; object-fit: cover; }
        .doc-card-author-name { font-size: 0.8em; color: var(--secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .role-badge { font-size:0.7em; margin-left:4px; border-radius:4px; padding:1px 6px; font-weight:600; white-space:nowrap; }
        .role-badge.owner { background:#c0392b; color:#f1c40f; }
        .role-badge.dojin { background:#e67e22; color:white; }
        .doc-card-title { font-weight: 700; font-size: 0.95em; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .doc-card-meta { font-size: 0.8em; color: var(--secondary); margin-top: 4px; display: flex; justify-content: space-between; }
        @media (max-width: 768px) { #docList { column-count: 2; column-gap: 10px; } .doc-card { margin-bottom: 10px; } .doc-card-info { padding: 8px 10px; } .doc-card-title { font-size: 0.85em; } }
        @media (max-width: 480px) { #docList { column-count: 2; column-gap: 8px; } .doc-card { margin-bottom: 8px; } .doc-card-info { padding: 6px 8px; } .doc-card-title { font-size: 0.75em; } .doc-card-meta { font-size: 0.7em; } .doc-card-placeholder { padding: 12px; font-size: 0.8em; } }
        
        .profile-header { display: flex; flex-direction: column; align-items: center; gap: 20px; margin: 20px 0; }
        @media (min-width: 600px) { .profile-header { flex-direction: row; align-items: flex-start; } }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; }
        .my-articles { margin-top: 24px; }
        .my-articles #profileDocList { column-count: 5; column-gap: 14px; }
        @media (max-width: 768px) { .my-articles #profileDocList { column-count: 2; column-gap: 10px; } }
        @media (max-width: 480px) { .my-articles #profileDocList { column-count: 2; column-gap: 8px; } }

        /* From Uiverse.io by andrew-manzyk */
        .loader {
            --main-size: 6em;
            --text-color: #2d2418;
            --shine-color: #d4a57440;
            --shadow-color: #b8a090;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            position: relative;
            font-size: var(--main-size);
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-color);
            width: 7.3em;
            height: 1em;
            filter: drop-shadow(0 0 0.05em var(--shine-color));
        }
        .loader .text { display: flex; align-items: center; justify-content: center; text-align: center; white-space: nowrap; overflow: hidden; position: absolute; }
        .loader .text:nth-child(1) { clip-path: polygon(0% 0%, 11.11% 0%, 11.11% 100%, 0% 100%); font-size: calc(var(--main-size) / 20); margin-left: -2.1em; opacity: 0.6; }
        .loader .text:nth-child(2) { clip-path: polygon(11.11% 0%, 22.22% 0%, 22.22% 100%, 11.11% 100%); font-size: calc(var(--main-size) / 16); margin-left: -0.98em; opacity: 0.7; }
        .loader .text:nth-child(3) { clip-path: polygon(22.22% 0%, 33.33% 0%, 33.33% 100%, 22.22% 100%); font-size: calc(var(--main-size) / 13); margin-left: -0.33em; opacity: 0.8; }
        .loader .text:nth-child(4) { clip-path: polygon(33.33% 0%, 44.44% 0%, 44.44% 100%, 33.33% 100%); font-size: calc(var(--main-size) / 11); margin-left: -0.05em; opacity: 0.9; }
        .loader .text:nth-child(5) { clip-path: polygon(44.44% 0%, 55.55% 0%, 55.55% 100%, 44.44% 100%); font-size: calc(var(--main-size) / 10); margin-left: 0em; opacity: 1; }
        .loader .text:nth-child(6) { clip-path: polygon(55.55% 0%, 66.66% 0%, 66.66% 100%, 55.55% 100%); font-size: calc(var(--main-size) / 11); margin-left: 0.05em; opacity: 0.9; }
        .loader .text:nth-child(7) { clip-path: polygon(66.66% 0%, 77.77% 0%, 77.77% 100%, 66.66% 100%); font-size: calc(var(--main-size) / 13); margin-left: 0.33em; opacity: 0.8; }
        .loader .text:nth-child(8) { clip-path: polygon(77.77% 0%, 88.88% 0%, 88.88% 100%, 77.77% 100%); font-size: calc(var(--main-size) / 16); margin-left: 0.98em; opacity: 0.7; }
        .loader .text:nth-child(9) { clip-path: polygon(88.88% 0%, 100% 0%, 100% 100%, 88.88% 100%); font-size: calc(var(--main-size) / 20); margin-left: 2.1em; opacity: 0.6; }
        .loader .text span { animation: scrolling 2s cubic-bezier(0.1, 0.6, 0.9, 0.4) infinite, shadow 2s cubic-bezier(0.1, 0.6, 0.9, 0.4) infinite; }
        .loader .text:nth-child(1) span { background: linear-gradient(to right, var(--text-color) 4%, var(--shadow-color) 7%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(2) span { background: linear-gradient(to right, var(--text-color) 9%, var(--shadow-color) 13%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(3) span { background: linear-gradient(to right, var(--text-color) 15%, var(--shadow-color) 18%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(4) span { background: linear-gradient(to right, var(--text-color) 20%, var(--shadow-color) 23%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(6) span { background: linear-gradient(to right, var(--shadow-color) 29%, var(--text-color) 32%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(7) span { background: linear-gradient(to right, var(--shadow-color) 34%, var(--text-color) 37%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(8) span { background: linear-gradient(to right, var(--shadow-color) 39%, var(--text-color) 42%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(9) span { background: linear-gradient(to right, var(--shadow-color) 45%, var(--text-color) 48%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .line { position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; height: 0.05em; width: calc(var(--main-size) / 2); margin-top: 0.9em; border-radius: 0.05em; }
        body.dark-mode .loader { --text-color: #ffffff; --shine-color: #ffffff40; --shadow-color: #aaaaaa; }
        @keyframes wobble { 0% { transform: translateX(-90%); } 50% { transform: translateX(90%); } 100% { transform: translateX(-90%); } }
        @keyframes scrolling { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        @keyframes shadow { 0% { background-position: -98% 0; } 100% { background-position: 102% 0; } }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        @media (max-width: 600px) {
            .switch { width: 3em; height: 1.7em; bottom: 16px; right: 16px; }
            .sort-tabs { width: 100%; }
            .sort-btn { flex: 1; text-align: center; padding: 5px 4px; font-size: 0.75em; }

            .navbar { flex-direction: row; align-items: center; gap: 6px; padding: 8px 12px; }
            .navbar h1 { font-size: 1em; margin: 0; }
            .user-info { flex: 1; justify-content: flex-end; gap: 6px; }
            #displayNickname { display: none; }
            #avatarContainer img, #avatarContainer .avatar-placeholder { width: 32px; height: 32px; font-size: 14px; }
            .nav-links { flex-wrap: nowrap; gap: 4px; width: auto; }
            .nav-links button { padding: 4px 8px; font-size: 11px; white-space: nowrap; }
            .gh-btn { width: 32px; height: 32px; }
            .gh-btn .svgContainer svg { width: 16px; height: 16px; }
            .noti-bell { width: 32px; height: 32px; }
            .noti-bell .bell-icon { font-size: 14px; }
            .noti-dropdown { width: 260px; right: 0; max-width: 90vw; }
            #collectionBar { gap: 8px; }
            .collection-chip { padding: 6px 12px; }
            .collection-chip-name { font-size: 0.8em; }
            .collection-chip-cover { width: 24px; height: 24px; }
            .input { width: 100% !important; max-width: 100%; font-size: 14px; }
            .input:focus { width: 100% !important; transform: none; }

            .auth-container { width: 90%; padding: 20px; }
            .auth-tab { font-size: 14px; padding: 8px 16px; }

    <script>
        const themeCheckbox = document.getElementById('themeCheckbox');
        function initTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            themeCheckbox.checked = isDark;
        }
        themeCheckbox.addEventListener('change', function(e) {
            document.body.classList.toggle('dark-mode', this.checked);
            localStorage.setItem('theme', this.checked ? 'dark' : 'light');
        });
        initTheme();

        let currentUser = null;

        window.onload = async function() {
            currentUser = await checkLogin();
            if (!currentUser) return;
            checkAdminBtn();
            initEditor();
            await load();

            // ✅ 隐藏遮罩，淡入内容
            const overlay = document.getElementById('loadingOverlay');
            const elementsToFadeIn = document.querySelectorAll('body > .toolbar, body > .status-bar, .EasyMDEContainer');
            const MIN_LOADING_TIME = 700;
            const startTime = performance.now();
            const elapsed = performance.now() - startTime;
    const remaining = Math.max(0, MIN_LOADING_TIME - elapsed);
            // 遮罩淡出
            setTimeout(() => {
            overlay.style.opacity = '0';
            // 内容淡入（已在CSS设 opacity:0, transition: 0.6s）
            elementsToFadeIn.forEach(el => el.style.opacity = '1');
            
            // 动画结束后移除遮罩DOM，防止遮挡点击
            setTimeout(() => {
                if (overlay && overlay.parentNode) {
                    overlay.parentNode.removeChild(overlay);
                }
            }, 400); // 与过渡时间匹配
                }, remaining);
        }
        function authFetch(url, options = {}) {
            const token = localStorage.getItem('token');
            if (token) {
                options.headers = {
                    ...options.headers,
                    'Authorization': 'Bearer ' + token
                };
            }
            return fetch(url, { ...options, signal: AbortSignal.timeout(15000) });
        }

        let hideRequested = false;
        const PAGE_LOAD_TIME = Date.now();

        function checkLogin() {
            const stored = localStorage.getItem('currentUser');
            if (stored) {
                try {
                    currentUser = JSON.parse(stored);
                    hideLoadingOverlay();
                    authFetch('/api/current_user')
                        .then(res => {
                            if (res.status === 401) {
                                localStorage.removeItem('token');
                                localStorage.removeItem('currentUser');
                                currentUser = null;
                                showAuth();
                                return null;
                            }
                            return res.json();
                        })
                        .then(data => {
                            if (!data) return;
                            if (data.user) {
                                currentUser = data.user;
                                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                                try {
                                    showMain();
                                    updateMsgBadge();
                                    if (Notification.permission === 'default') Notification.requestPermission();
                                } catch(e) {
                                    // 界面错误不触发掉登录
                                    console.error('UI init error:', e);
                                }
                            } else {
                                localStorage.removeItem('token');
                                localStorage.removeItem('currentUser');
                                currentUser = null;
                                showAuth();
                            }
                        }).catch((e) => {
                            // 仅网络/服务器异常才走掉登录
                            console.error('Auth check failed:', e);
                            localStorage.removeItem('token');
                            localStorage.removeItem('currentUser');
                            currentUser = null;
                            showAuth();
                        });
                } catch(e) {
                    showAuth();
                }
            } else {
                hideLoadingOverlay();
                showAuth();
            }
        }

        function showAuth() {
            document.getElementById('authView').classList.remove('hidden');
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('profileView').classList.add('hidden');
        }
        function showMain() {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('profileView').classList.add('hidden');
            updateNavbar();
            loadDocList();
            loadCollectionBar();
            checkAdminBtn();
        }
        function showProfile() {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('profileView').classList.remove('hidden');
            loadProfile();
        }
        function logout() {
            currentUser = null;
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            showAuth();
        }

        function updateNavbar() {
            if (currentUser) {
                document.getElementById('displayNickname').innerText = currentUser.nickname;
                const avatarCont = document.getElementById('avatarContainer');
                if (currentUser.avatar) {
                    avatarCont.innerHTML = `<img src="/avatars/${currentUser.avatar}" class="avatar" style="cursor:pointer;">`;
                } else {
                    avatarCont.innerHTML = `<div class="avatar-placeholder" style="cursor:pointer;">${currentUser.nickname.charAt(0).toUpperCase()}</div>`;
                }
                avatarCont.onclick = showProfile;
            }
        }

        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const isLogin = this.dataset.tab === 'login';
                document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
                document.getElementById('registerForm').classList.toggle('hidden', isLogin);
            });
        });

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) return alert('请输入用户名和密码');
            const res = await authFetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            const data = await res.json();
            if (data.status === 'ok') {
                currentUser = data.user;
                localStorage.setItem('token', data.token);
localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showMain();
                updateMsgBadge();
                if (Notification.permission === 'default') Notification.requestPermission();
            } else document.getElementById('authError').innerText = data.message;
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const nickname = document.getElementById('regNickname').value.trim();
            const password = document.getElementById('regPassword').value;
            if (!username || !nickname || !password) return alert('请完整填写');
            const res = await authFetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, nickname, password }) });
            const data = await res.json();
            if (data.status === 'ok') {
                alert('注册成功，请登录');
                document.querySelector('[data-tab="login"]').click();
            } else document.getElementById('authError').innerText = data.message;
        }

        // ===== 头像工具函数 =====
        function getAvatarHtml(author, avatars) {
            if (!author) return '<div class="doc-card-avatar">?</div>';
            var avFile = avatars && avatars[author];
            if (avFile) {
                return '<img class="doc-card-avatar" src="/avatars/' + avFile + '">';
            }
            return '<div class="doc-card-avatar">' + author.charAt(0).toUpperCase() + '</div>';
        }

        function roleBadgeHtml(roles, author) {
            var role = (roles || {})[author];
            var html = '';
            if (role === 'owner' || role === 'owner_dojin') html += '<span class="role-badge owner">站长</span>';
            if (role === 'admin' || role === 'admin_dojin') html += '<span class="role-badge admin">管理员</span>';
            if (role && role.indexOf('_dojin') !== -1) html += '<span class="role-badge dojin">同人</span>';
            return html;
        }

        function renderCard(item) {
            var title = item.title || item.id;
            var author = (item.authors || [])[0] || '';
            var avatars = item.author_avatars || {};
            var roles = item.author_roles || {};
            var cover = item.cover || '';
            var coverHtml = cover 
                ? '<img class="doc-card-img" src="' + cover + '" alt="' + title + '" loading="lazy">'
                : '<div class="doc-card-placeholder"><span>' + title + '</span></div>';
            return '<div class="doc-card" onclick="location.href=\'/read/' + item.id + '\'">' +
                coverHtml +
                '<div class="doc-card-info">' +
                '<div class="doc-card-author">' + getAvatarHtml(author, avatars) + '<span class="doc-card-author-name">' + author + '</span></div>' +
                '<div class="doc-card-title">' + title + '</div>' +
                '<div class="doc-card-meta"><span>#' + item.number + '</span></div>' +
                '</div></div>';
        }

        var _currentSort = 'updated';

        function setSort(sort) {
            _currentSort = sort;
            document.querySelectorAll('.sort-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.sort === sort);
            });
            loadDocList();
        }

        async function loadDocList() {
            const res = await authFetch('/api/docs?sort=' + _currentSort);
            const docs = await res.json();
            var html = docs.map(renderCard).join('');
            document.getElementById('docList').innerHTML = html || '<p>暂无文章</p>';
        }

        async function loadCollectionBar() {
            try {
                const res = await fetch('/api/collections');
                const cols = await res.json();
                var bar = document.getElementById('collectionBar');
                var section = document.getElementById('collectionSection');
                if (!cols.length) { section.style.display = 'none'; return; }
                section.style.display = 'block';
                bar.innerHTML = cols.map(function(c) {
                    var imgHtml = c.cover ? '<img class="collection-chip-cover" src="' + c.cover + '">' : '';
                    return '<div class="collection-chip" onclick="location.href=\'/collections/' + c.id + '\'">' + imgHtml + '<span class="collection-chip-name">' + c.name + '</span></div>';
                }).join('');
            } catch(e) {
                document.getElementById('collectionSection').style.display = 'none';
            }
        }

        async function toggleDrafts() {
            console.log('toggleDrafts called, currentUser:', currentUser);
            if (!currentUser) { alert('请先登录'); return; }
            const section = document.getElementById('draftsSection');
            const list = document.getElementById('draftList');
            console.log('section:', section, 'list:', list);
            if (!section || !list) return;
            // 切换显示/隐藏
            if (section.style.display === 'block') {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';
            list.innerHTML = '<p>加载中...</p>';
            try {
                const res = await authFetch('/api/my_drafts');
                const drafts = await res.json();
                console.log('drafts:', drafts);
                if (!Array.isArray(drafts) || drafts.length === 0) {
                    list.innerHTML = '<p>暂无草稿</p>';
                } else {
                    list.innerHTML = drafts.map(d => 
                        `<button class="doc-btn" onclick="location.href='/edit/${d.id}'" style="opacity:0.85;">📝 #${d.number} ${d.title}</button>`
                    ).join('');
                }
            } catch(e) {
                list.innerHTML = '<p style="color:red;">加载失败，请刷新重试</p>';
                console.error('drafts load error:', e);
            }
        }
        window.toggleDrafts = toggleDrafts;

        function createNewDoc() {
            authFetch('/api/create_doc', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ docId: '' }) })
                .then(r => r.json())
                .then(data => { window.location.href = `/edit/${data.doc_id}`; })
                .catch(() => alert('创建失败，请刷新重试'));
        }

        async function loadProfile() {
            if (!currentUser) return;
            const res = await authFetch(`/api/user/${encodeURIComponent(currentUser.username)}`, { headers: { 'X-Username': currentUser.username } });
            const userData = await res.json();
            if (!userData || !userData.nickname) return;
            const articles = userData.articles || [];
            // 用字符串拼接避免 backtick 嵌套
            var html = '<div class="profile-header">';
            if (currentUser.avatar) {
                html += '<img src="/avatars/' + currentUser.avatar + '" class="profile-avatar">';
            } else {
                html += '<div class="avatar-placeholder" style="width:100px;height:100px;font-size:40px;">' + currentUser.nickname.charAt(0) + '</div>';
            }
            html += '<div style="flex:1;">' +
                '<h2>' + currentUser.nickname + ' (@' + currentUser.username + ')</h2>' +
                '<p>参与创作 ' + articles.length + ' 篇文章  |  <a href="#" onclick="showMyFollowers()">粉丝 ' + (userData.followers_count||0) + '</a>  |  <a href="#" onclick="showMyFollowing()">关注 ' + (userData.following_count||0) + '</a></p>' +
                '<button class="basic-btn" onclick="document.getElementById(\'avatarUpload\').click()">更换头像</button>' +
                '<input type="file" id="avatarUpload" accept="image/*" style="display:none;" onchange="uploadAvatar(this)">' +
                '</div></div>';
            html += '<div class="my-articles"><h3>我的文章</h3><div id="profileDocList">';
            for (var ai = 0; ai < articles.length; ai++) {
                var a = articles[ai];
                var authorName = (a.authors||[])[0]||'';
                // 个人页面直接用当前用户头像
                var fakeItem = { id: a.id, title: a.title, number: a.number, cover: a.cover, authors: [authorName], author_avatars: {} };
                if (currentUser && currentUser.avatar) {
                    fakeItem.author_avatars[authorName] = currentUser.avatar;
                }
                html += renderCard(fakeItem);
            }
            html += '</div></div>';
            html += '<div style="margin-top:30px;text-align:center;"><button style="background:transparent;color:#c0392b;padding:8px 24px;border:1px solid #c0392b;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;" onclick="logout()">退出登录</button></div>';
            document.getElementById('profileContent').innerHTML = html;
        }

        async function updateNotiBadge(customCount) {
            if (!currentUser) return;
            const cnt = customCount !== undefined ? customCount : (await authFetch('/api/notifications/count', { headers: { 'X-Username': currentUser.username } }).then(r=>r.json())).count;
            const badge = document.getElementById('notiBadge');
            badge.textContent = cnt || 0;
            badge.style.display = cnt > 0 ? 'flex' : 'none';
        }
        function updateMsgBadge() { updateNotiBadge(); }

        async function loadNotifications() {
            if (!currentUser) return;
            const res = await authFetch('/api/notifications', { headers: { 'X-Username': currentUser.username } });
            const notis = await res.json();
            document.getElementById('notiList').innerHTML = notis.length ? notis.map(n => `
                <div class="noti-item ${n.read?'':'unread'}" onclick="markReadAndGo('${n.id}','${n.doc_id}','${n.comment_id||''}')">
                    ${n.from_avatar ? `<img src="/avatars/${n.from_avatar}" class="noti-avatar">` : `<div class="noti-avatar">${n.from_user?.charAt(0)||'?'}</div>`}
                    <div class="noti-content"><strong>${n.from_user}</strong> ${n.type==='reply'?'回复了你':'赞了你的评论'}<div>${n.content||''}</div><div class="noti-time">${new Date(n.timestamp).toLocaleString()}</div></div>
                </div>`).join('') : '<div class="noti-empty">暂无通知</div>';
        }

        window.toggleNotiDropdown = () => {
            const dd = document.getElementById('notiDropdown');
            if (dd.style.display === 'block') dd.style.display = 'none';
            else { loadNotifications(); dd.style.display = 'block'; }
        };

        window.markAllRead = async () => {
            if (!currentUser) return;
            await authFetch('/api/notifications/read', { method: 'POST', headers: { 'X-Username': currentUser.username } });
            updateNotiBadge(0);
            loadNotifications();
        };

        window.markReadAndGo = async (notiId, docId, commentId) => {
            if (currentUser && notiId) {
                let readList = JSON.parse(localStorage.getItem('readNotis')||'[]');
                if (!readList.includes(notiId)) { readList.push(notiId); localStorage.setItem('readNotis', JSON.stringify(readList)); }
                updateMsgBadge();
            }
            if (docId) window.location.href = commentId ? `/read/${docId}#comment-${commentId}` : `/read/${docId}`;
        };

        function showToast(title, content) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;top:20px;right:20px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;box-shadow:var(--shadow);z-index:9999;animation:toastSlideIn .3s ease';
            toast.innerHTML = `<strong style="color:var(--primary)">${title}</strong><div>${content}</div>`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.animation='toastSlideOut .3s ease'; setTimeout(()=>toast.remove(),300); }, 3000);
        }

        checkLogin();
    
        function hideLoadingOverlay() {
            hideRequested = true;
            const elapsed = Date.now() - PAGE_LOAD_TIME;
            const remaining = Math.max(0, 1000 - elapsed);
            setTimeout(function() {
                const overlay = document.getElementById('loadingOverlay');
                if (!overlay || overlay.style.display === 'none') return;
                overlay.style.opacity = "0";
                setTimeout(function() { overlay.style.display = "none"; }, 300);
            }, remaining);
        }

        let searchTimer = null;
        function search() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(doSearch, 300);
        }
        async function doSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) { loadDocList(); return; }
            const list = document.getElementById('docList');
            list.innerHTML = '<p>搜索中...</p>';
            try {
                // 同时搜文章和用户
                var [articlesRes, usersRes] = await Promise.all([
                    authFetch('/api/search?q=' + encodeURIComponent(q)),
                    fetch('/api/search/users?q=' + encodeURIComponent(q))
                ]);
                var articles = await articlesRes.json();
                var users = await usersRes.json();
                
                var html = '';
                
                // 用户结果
                if (users.length > 0) {
                    html += '<div class="search-section-label"><h3>👤 作者</h3></div>';
                    for (var ui = 0; ui < users.length; ui++) {
                        var u = users[ui];
                        var uName = u.nickname || u.username;
                        var avFile = u.avatar;
                        var avHtml = avFile 
                            ? '<img class="search-user-avatar" src="/avatars/' + avFile + '">'
                            : '<div class="search-user-avatar placeholder">' + uName.charAt(0).toUpperCase() + '</div>';
                        html += '<div class="search-user-card" onclick="location.href=\'/user/' + encodeURIComponent(u.username) + '\'">' +
                            avHtml +
                            '<div class="search-user-info">' +
                            '<div class="search-user-name">' + uName + '</div>' +
                            '<div class="search-user-username">@' + u.username + '</div>' +
                            '</div></div>';
                    }
                }
                
                // 文章结果
                if (articles.length > 0) {
                    html += '<div class="search-section-label"><h3>📄 文章</h3></div>';
                    for (var si = 0; si < articles.length; si++) {
                        var item = articles[si];
                        var title = item.title || item.id;
                        var author = (item.authors || [])[0] || '';
                        var avatars = item.author_avatars || {};
                        var roles = item.author_roles || {};
                        var cover = item.cover || '';
                        var coverHtml = cover
                            ? '<img class="doc-card-img" src="' + cover + '" alt="' + title + '" loading="lazy">'
                            : '<div class="doc-card-placeholder"><span>' + title + '</span></div>';
                        html += '<div class="doc-card" onclick="location.href=\'/read/' + item.id + '\'">' +
                            coverHtml +
                            '<div class="doc-card-info">' +
                            '<div class="doc-card-author">' + getAvatarHtml(author, avatars) + '<span class="doc-card-author-name">' + author + '</span></div>' +
                            '<div class="doc-card-title">' + title + '</div>' +
                            '<div class="doc-card-meta"><span>#' + item.number + '</span></div>' +
                            '</div></div>';
                    }
                }
                
                if (!users.length && !articles.length) {
                    html = '<p>未找到相关结果</p>';
                }
                list.innerHTML = html;
            } catch(e) {
                list.innerHTML = '<p style="color:red;">搜索失败，请重试</p>';
            }
        }
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { clearTimeout(searchTimer); doSearch(); }
                });
            }
        });

        function uploadAvatar(input) {
            const file = input.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('avatar', file);
            authFetch('/api/upload_avatar', { method: 'POST', body: formData })
            .then(res => res.json()).then(data => {
                if (data.status === 'ok') {
                    currentUser.avatar = data.avatar;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    loadProfile();
                    showToast('头像已更新');
                } else showToast(data.message || '上传失败');
            }).catch(() => showToast('上传失败'));
        }

        // Fallback: hide loader after 4s no matter what
        setTimeout(function() {
            hideLoadingOverlay();
        }, 4000);
        // ===== 合集相关 =====
    let collectionPickDocId = null;

    async function showCollectionPicker(docId) {
        if (!currentUser) { alert('请先登录'); return; }
        collectionPickDocId = docId;
        const modal = document.getElementById('collectionPickerModal');
        if (!modal) return;
        modal.style.display = 'flex';
        const list = document.getElementById('collectionPickerList');
        list.innerHTML = '<p>加载中...</p>';

        const res = await authFetch('/api/my_collections');
        const collections = await res.json();
        if (collections.length === 0) {
            list.innerHTML = `
                <p>你还没有创建合集</p>
                <div style="display:flex;gap:8px;">
                    <input id="newCollectionName" type="text" placeholder="合集名称" class="input" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);color:var(--text);">
                    <button class="basic-btn" onclick="createAndAddCollection()" style="white-space:nowrap;">+ 创建并加入</button>
                </div>
            `;
            return;
        }
        list.innerHTML = collections.map(c => `
            <div onclick="addToCollection('${c.id}')" style="padding:12px 16px; border:1px solid var(--border); border-radius:8px; margin-bottom:8px; cursor:pointer; transition:background 0.2s;" onmouseover="this.style.background='var(--card-bg)'" onmouseout="this.style.background='transparent'">
                <div style="font-weight:600;">${c.name}</div>
                <div style="font-size:0.85em; opacity:0.7;">${c.article_count || 0} 篇文章</div>
            </div>
        `).join('');
    }

    async function createAndAddCollection() {
        const name = document.getElementById('newCollectionName').value.trim();
        if (!name) { alert('请填写合集名称'); return; }
        const res = await authFetch('/api/collections', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        });
        const data = await res.json();
        if (data.status === 'ok') {
            await addToCollection(data.collection_id);
        } else {
            alert(data.message || '创建失败');
        }
    }

    async function addToCollection(collectionId) {
        const docId = collectionPickDocId;
        if (!docId) return;
        const res = await authFetch('/api/collections/' + collectionId + '/articles', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ doc_id: docId })
        });
        const data = await res.json();
        if (data.status === 'ok') {
            showToast('已加入合集', '✅ 成功');
            document.getElementById('collectionPickerModal').style.display = 'none';
        } else {
            alert(data.message);
        }
    }
        
</script>
    <!-- 合集选择弹窗 -->
    <div class="modal" id="collectionPickerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9998; justify-content:center; align-items:center;">
        <div style="background:var(--card-bg); padding:24px; border-radius:16px; max-width:400px; width:90%; max-height:80vh; overflow-y:auto;">
            <h3 style="margin-top:0;">添加到合集</h3>
            <div id="collectionPickerList"></div>
            <div style="margin-top:12px;">
                <button class="basic-btn" onclick="document.getElementById('collectionPickerModal').style.display='none'">取消</button>
            </div>
        </div>
    </div>
    <script>
    var pickerModal = document.getElementById('collectionPickerModal');
    if (pickerModal) {
        pickerModal.addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
    }

    // ---------- 站长管理面板 ----------
    function showAdminPanel() {
        var panel = document.getElementById('adminPanel');
        var shown = panel.style.display === 'block';
        panel.style.display = shown ? 'none' : 'block';
        if (!shown) loadUserListForAdmin();
    }

    async function loadUserListForAdmin() {
        var list = document.getElementById('adminUserList');
        list.innerHTML = '<p style="opacity:0.7;">加载中...</p>';
        try {
            var res = await authFetch('/api/admin/user_list');
            var data = await res.json();
            if (data.users) {
                list.innerHTML = data.users.map(function(u) {
                    var badge = '';
                    if (u.role === 'owner') badge = '<span class="role-badge owner">站长</span>';
                    else if (u.role === 'admin') badge = '<span class="role-badge admin">管理员</span>';
                    var dojinBtn = u.is_dojin
                        ? '<button class="basic-btn" style="min-width:60px;" onclick="toggleDojin(\'' + u.username + '\', false)">取消同人</button>'
                        : '<button class="basic-btn" style="min-width:60px;" onclick="toggleDojin(\'' + u.username + '\', true)">设为同人</button>';
                    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">'
                        + '<span>' + u.nickname + ' (@' + u.username + ')' + badge + (u.is_dojin ? '<span class="role-badge dojin">同人</span>' : '') + '</span>'
                        + '<span style="margin-left:auto;">' + dojinBtn + '</span>'
                        + '</div>';
                }).join('');
            }
        } catch(e) {
            console.error('admin load error:', e);
            list.innerHTML = '<p style="color:red;">加载失败</p>';
        }
    }

    function toggleDojin(targetUsername, setDojin) {
        authFetch('/api/admin/set_dojin', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: targetUsername, action: setDojin ? 'set' : 'unset'})
        }).then(function(r) { return r.json(); }).then(function(data) {
            if (data.status === 'ok') {
                loadUserListForAdmin();
            } else {
                alert(data.message || '操作失败');
            }
        }).catch(function() { alert('网络错误'); });
    }

    // 站长登录后显示管理按钮
    function checkAdminBtn() {
        var btn = document.getElementById('adminBtn');
        if (btn && currentUser && currentUser.role === 'owner') {
            btn.style.display = 'inline-block';
        }
    }
</script>
