<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户 - {{ username }}</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        #app {
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        :root {
            --bg: #fdf6ee;
            --card-bg: #fffbf5;
            --text: #2d2418;
            --border: #e8ddd0;
            --primary: #d4a574;
            --primary-hover: #c4915a;
            --secondary: #a09080;
            --secondary-hover: #8a7a6a;
            --shadow: rgba(180,140,100,0.08);
            --noti-bg: #fffbf5;
            --comment-highlight: rgba(212,165,116,0.10);
            --search-bg: #f5ede2;
            --search-glow: rgba(212,165,116,0.10);
            --bell-bg: #fffbf5;
            --bell-icon: #a09080;
            --bell-gradient-start: #d4a574;
            --bell-gradient-end: #e8c9a0;
            --avatar-bg: #f5ede2;
            --button-text: #2d2418;
body.dark-mode {
            --bg: #1e1814;
            --card-bg: #2a221c;
            --text: #ffffff;
            --border: #3a3028;
            --primary: #d4a574;
            --primary-hover: #c4915a;
            --secondary: #8a7a6a;
            --secondary-hover: #a09080;
            --shadow: rgba(0,0,0,0.3);
            --noti-bg: #2a221c;
            --comment-highlight: rgba(212,165,116,0.15);
            --search-bg: #2a221c;
            --search-glow: rgba(212,165,116,0.15);
            --bell-bg: #2a221c;
            --bell-icon: #a09080;
            --bell-gradient-start: #d4a574;
            --bell-gradient-end: #e8c9a0;
            --avatar-bg: #2a221c;
            --button-text: #000000;
            --bg-color-card: #2a221c;
            --bg-color-alt: #a09080;
            --font-color: #e8ddd0;
            --main-color: #e8ddd0;
        }
}
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; scrollbar-width: none !important; }
        ::-webkit-scrollbar, *::-webkit-scrollbar { display: none !important; }
        html, body { scrollbar-width: none !important; -ms-overflow-style: none !important; }
        html::-webkit-scrollbar, body::-webkit-scrollbar, *::-webkit-scrollbar { display: none !important; }
        body {
            font-family: 'Noto Serif SC', 'SimSun', 'STSong', '宋体', serif;
            font-weight: 500;
            max-width: 700px; margin: 0 auto; padding: 20px; background: var(--bg);
            line-height: 1.6; color: var(--text); overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn {
            padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer;
            font-weight: 600; font-size: 16px; outline: none; transition: background 0.2s;
            font-family: inherit;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-secondary:hover { background: #5a6268; }

        .profile-header {
            display: flex; align-items: center; gap: 20px; margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
            background: var(--primary); color: white; display: flex; align-items: center;
            justify-content: center; font-size: 36px; font-weight: 700;
        }
        .profile-info h2 { margin: 0 0 5px; }
        .profile-info p { margin: 2px 0; opacity: 0.8; }
        .role-badge { font-size:0.7em; margin-left:6px; border-radius:4px; padding:1px 8px; font-weight:600; vertical-align:middle; display:inline-block; }
        .role-badge.owner { background:#c0392b; color:#f1c40f; }
        .role-badge.admin { background:#2980b9; color:white; }
        .role-badge.dojin { background:#e67e22; color:white; }

        .stats a {
            color: var(--text);
            margin: 0 5px;
            cursor: pointer;
            text-decoration: underline dotted;
        }

        .articles-section {
            background: var(--card-bg); border-radius: 16px; padding: 20px;
            box-shadow: var(--shadow); margin-bottom: 20px;
        }
        .articles-section h3 { margin-top: 0; }
        #articleList { column-count: 3; column-gap: 16px; }
        .doc-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 8px var(--shadow); transition: transform 0.2s, box-shadow 0.2s; break-inside: avoid; margin-bottom: 16px; }
        .doc-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); }
        .doc-card-img { width: 100%; height: auto; display: block; }
        .doc-card-placeholder { width: 100%; aspect-ratio: 16/10; display: flex; align-items: center; justify-content: center; background: var(--card-bg); color: var(--text); font-size: 1.3em; font-weight: 900; padding: 20px; text-align: center; line-height: 1.4; border-bottom: 1px solid var(--border); }
        .doc-card-info { padding: 10px 12px; }
        .doc-card-title { font-weight: 700; font-size: 0.95em; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .doc-card-meta { font-size: 0.8em; color: var(--secondary); margin-top: 4px; display: flex; justify-content: space-between; }
        @media (max-width: 768px) { #articleList { column-count: 2; column-gap: 10px; } .doc-card { margin-bottom: 10px; } .doc-card-info { padding: 8px 10px; } .doc-card-title { font-size: 0.85em; } }
        @media (max-width: 480px) { #articleList { column-count: 2; column-gap: 8px; } .doc-card { margin-bottom: 8px; } .doc-card-info { padding: 6px 8px; } .doc-card-title { font-size: 0.75em; } .doc-card-meta { font-size: 0.7em; } .doc-card-placeholder { padding: 12px; font-size: 0.8em; } }

        .user-list-item {
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
        }
        .user-list-item img {
            width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
        }

        /* === 夜间切换开关 === */
        .switch {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            font-size: 17px;
            display: inline-block;
            width: 3.5em;
            height: 2em;
            transform-style: preserve-3d;
            perspective: 500px;
            animation: toggle__animation 3s infinite;
        }
        .switch::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            filter: blur(20px);
            z-index: -1;
            border-radius: 50px;
            background-color: #d8ff99;
            background-image: radial-gradient(at 21% 46%, hsla(183,65%,60%,1) 0px, transparent 50%),
            radial-gradient(at 23% 25%, hsla(359,74%,70%,1) 0px, transparent 50%),
            radial-gradient(at 20% 1%, hsla(267,83%,75%,1) 0px, transparent 50%),
            radial-gradient(at 86% 87%, hsla(204,69%,68%,1) 0px, transparent 50%),
            radial-gradient(at 99% 41%, hsla(171,72%,77%,1) 0px, transparent 50%),
            radial-gradient(at 55% 24%, hsla(138,60%,62%,1) 0px, transparent 50%);
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .switch .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #fdfefedc;
            transition: .4s;
            border-radius: 30px;
        }
        .switch .slider:before {
            position: absolute;
            content: "";
            height: 1.4em;
            width: 1.4em;
            left: 0.3em;
            bottom: 0.35em;
            transition: .4s;
            border-radius: 50%;
            box-shadow: rgba(0, 0, 0, 0.17) 0px -10px 10px 0px inset,
                rgba(0, 0, 0, 0.09) 0px -1px 15px -8px;
            background-color: #ff99fd;
            background-image: radial-gradient(at 81% 39%, hsla(327,79%,79%,1) 0px, transparent 50%),
            radial-gradient(at 11% 72%, hsla(264,64%,79%,1) 0px, transparent 50%),
            radial-gradient(at 23% 20%, hsla(75,98%,71%,1) 0px, transparent 50%);
        }
        .input__check:checked + .slider {
            background-color: #17202A;
        }
        .input__check:checked + .slider:before {
            transform: translateX(1.5em);
        }
        @keyframes toggle__animation {
            0%, 100% { transform: translateY(-10px) rotateX(15deg) rotateY(-20deg); }
            50% { transform: translateY(0px) rotateX(15deg) rotateY(-20deg); }
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .navbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .navbar h1 { font-size: 1.3em; }
            .nav-links { flex-wrap: wrap; gap: 6px; }
            .nav-links button, .basic-btn {
                font-size: 12px !important;
                padding: 0 12px !important;
                height: 30px !important;
            }
            .profile-header { flex-direction: column; align-items: center; }
            .profile-header { flex-direction: column; align-items: flex-start; }
            .switch {
                width: 3em;
                height: 1.7em;
                bottom: 16px;
                right: 16px;
            }
        }

        /* 统一的 basic-btn 按钮样式 */
        .basic-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            outline: none;
            cursor: pointer;
            width: auto;
            min-width: 80px;
            height: 36px;
            padding: 0 18px;
            background: transparent !important;
            background-image: linear-gradient(to top, #D8D9DB 0%, #fff 80%, #FDFDFD 100%) !important;
            border: 1px solid #8F9092 !important;
            border-radius: 30px;
            transition: all 0.2s ease;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: #000000 !important;
            text-shadow: 0 1px #fff;
            white-space: nowrap;
        }
        .basic-btn:hover {
            background: transparent !important;
            background-image: linear-gradient(to top, #D8D9DB 0%, #fff 80%, #FDFDFD 100%) !important;
            box-shadow: 0 4px 3px 1px #FCFCFC, 0 6px 8px #D6D7D9, 0 -4px 4px #CECFD1, 0 -6px 4px #FEFEFE, inset 0 0 3px 3px #CECFD1 !important;
        }
        .basic-btn:active,
        .basic-btn:focus {
            background: transparent !important;
            background-image: linear-gradient(to top, #D8D9DB 0%, #fff 80%, #FDFDFD 100%) !important;
            box-shadow: 0 4px 3px 1px #FCFCFC, 0 6px 8px #D6D7D9, 0 -4px 4px #CECFD1, 0 -6px 4px #FEFEFE, inset 0 0 5px 3px #999, inset 0 0 30px #aaa !important;
        }
        body.dark-mode .basic-btn,
        body.dark-mode .basic-btn:hover,
        body.dark-mode .basic-btn:focus {
            background: transparent !important;
            background-image: linear-gradient(to top, #D8D9DB 0%, #fff 80%, #FDFDFD 100%) !important;
            color: #000000 !important;
            text-shadow: 0 1px #fff !important;
        }

.loader {
            --main-size: 6em;
            --text-color: #2d2418;
            --shine-color: #d4a57440;
            --shadow-color: #b8a090;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            position: relative;
            font-size: var(--main-size);
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-color);
            width: 7.3em;
            height: 1em;
            filter: drop-shadow(0 0 0.05em var(--shine-color));
        }
        .loader .text { display: flex; align-items: center; justify-content: center; text-align: center; white-space: nowrap; overflow: hidden; position: absolute; }
        .loader .text:nth-child(1) { clip-path: polygon(0% 0%, 11.11% 0%, 11.11% 100%, 0% 100%); font-size: calc(var(--main-size) / 20); margin-left: -2.1em; opacity: 0.6; }
        .loader .text:nth-child(2) { clip-path: polygon(11.11% 0%, 22.22% 0%, 22.22% 100%, 11.11% 100%); font-size: calc(var(--main-size) / 16); margin-left: -0.98em; opacity: 0.7; }
        .loader .text:nth-child(3) { clip-path: polygon(22.22% 0%, 33.33% 0%, 33.33% 100%, 22.22% 100%); font-size: calc(var(--main-size) / 13); margin-left: -0.33em; opacity: 0.8; }
        .loader .text:nth-child(4) { clip-path: polygon(33.33% 0%, 44.44% 0%, 44.44% 100%, 33.33% 100%); font-size: calc(var(--main-size) / 11); margin-left: -0.05em; opacity: 0.9; }
        .loader .text:nth-child(5) { clip-path: polygon(44.44% 0%, 55.55% 0%, 55.55% 100%, 44.44% 100%); font-size: calc(var(--main-size) / 10); margin-left: 0em; opacity: 1; }
        .loader .text:nth-child(6) { clip-path: polygon(55.55% 0%, 66.66% 0%, 66.66% 100%, 55.55% 100%); font-size: calc(var(--main-size) / 11); margin-left: 0.05em; opacity: 0.9; }
        .loader .text:nth-child(7) { clip-path: polygon(66.66% 0%, 77.77% 0%, 77.77% 100%, 66.66% 100%); font-size: calc(var(--main-size) / 13); margin-left: 0.33em; opacity: 0.8; }
        .loader .text:nth-child(8) { clip-path: polygon(77.77% 0%, 88.88% 0%, 88.88% 100%, 77.77% 100%); font-size: calc(var(--main-size) / 16); margin-left: 0.98em; opacity: 0.7; }
        .loader .text:nth-child(9) { clip-path: polygon(88.88% 0%, 100% 0%, 100% 100%, 88.88% 100%); font-size: calc(var(--main-size) / 20); margin-left: 2.1em; opacity: 0.6; }
        .loader .text span { animation: scrolling 2s cubic-bezier(0.1, 0.6, 0.9, 0.4) infinite, shadow 2s cubic-bezier(0.1, 0.6, 0.9, 0.4) infinite; }
        .loader .text:nth-child(1) span { background: linear-gradient(to right, var(--text-color) 4%, var(--shadow-color) 7%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(2) span { background: linear-gradient(to right, var(--text-color) 9%, var(--shadow-color) 13%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(3) span { background: linear-gradient(to right, var(--text-color) 15%, var(--shadow-color) 18%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(4) span { background: linear-gradient(to right, var(--text-color) 20%, var(--shadow-color) 23%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(6) span { background: linear-gradient(to right, var(--shadow-color) 29%, var(--text-color) 32%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(7) span { background: linear-gradient(to right, var(--shadow-color) 34%, var(--text-color) 37%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(8) span { background: linear-gradient(to right, var(--shadow-color) 39%, var(--text-color) 42%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .text:nth-child(9) span { background: linear-gradient(to right, var(--shadow-color) 45%, var(--text-color) 48%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }
        .loader .line { position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; height: 0.05em; width: calc(var(--main-size) / 2); margin-top: 0.9em; border-radius: 0.05em; }
        body.dark-mode .loader { --text-color: #ffffff; --shine-color: #ffffff40; --shadow-color: #aaaaaa; }
        @keyframes wobble { 0% { transform: translateX(-90%); } 50% { transform: translateX(90%); } 100% { transform: translateX(-90%); } }
        @keyframes scrolling { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        @keyframes shadow { 0% { background-position: -98% 0; } 100% { background-position: 102% 0; } }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
    
        
        </style>

    <div id="app">
        <div class="profile-header">
            <div id="avatar" class="profile-avatar"></div>
            <div class="profile-info">
                <h2 id="nickname"></h2>
                <p>@<span id="usernameDisplay"></span></p>
                <p class="stats">
                    文章 <span id="articleCount">0</span> ·
                    <a id="followersLink" href="#" onclick="showUserList('followers'); return false;">粉丝 <span id="followersCount">0</span></a> ·
                    <a id="followingLink" href="#" onclick="showUserList('following'); return false;">关注 <span id="followingCount">0</span></a>
                </p>
                <!-- 关注 + 私信 按钮区域 -->
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
                    <button id="followBtn" class="btn btn-primary" style="display:none;">关注</button>
                    <!-- 新增：私信按钮 -->
                    <button id="msgBtn" class="basic-btn" style="display:none;" onclick="sendMessageToUser()">
                        私信
                    </button>
                </div>
            </div>
        </div>

        <div class="articles-section" id="contentArea">
            <h3>参与的文章</h3>
            <div id="articleList"></div>
        </div>

        <button class="basic-btn" onclick="location.href='/'">← 返回大厅</button>
    </div>

    <label class="switch">
        <input type="checkbox" class="input__check" id="themeCheckbox">
        <span class="slider"></span>
    </label>

    <script>
        // ===== 统一的认证 fetch =====
        function authFetch(url, options = {}) {
            const token = localStorage.getItem('token');
            if (token) {
                options.headers = {
                    ...options.headers,
                    'Authorization': 'Bearer ' + token
                };
            }
            return fetch(url, { ...options, signal: AbortSignal.timeout(15000) });
        }

        // 获取当前登录用户
        async function getCurrentUser() {
            const token = localStorage.getItem('token');
            if (!token) return null;
            try {
                const res = await authFetch('/api/current_user');
                const data = await res.json();
                if (data.user) {
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    return data.user;
                }
            } catch(e) {}
            return null;
        }

        const themeCheckbox = document.getElementById('themeCheckbox');
        function initTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            themeCheckbox.checked = isDark;
        }
        themeCheckbox.addEventListener('change', function(e) {
            document.body.classList.toggle('dark-mode', this.checked);
            localStorage.setItem('theme', this.checked ? 'dark' : 'light');
        });
        initTheme();

        const username = "{{ username }}";
        let currentUser = null;

        // 跳转到私信页面
        function sendMessageToUser() {
            // 直接跳转到 /messages/用户名
            window.location.href = '/messages/' + encodeURIComponent(username);
        }

        async function load() {
            currentUser = await getCurrentUser();

            const apiUrl = '/api/user/' + encodeURIComponent(username);
            try {
                const res = await authFetch(apiUrl);
                const data = await res.json();
                if (!data.username) {
                    document.getElementById('app').innerHTML = '<h2>用户不存在</h2><button class="basic-btn" onclick="location.href=\'/\'">返回大厅</button>';
                    return;
                }

                let nicknameHtml = data.nickname;
                if (data.role === 'owner') {
                    nicknameHtml += '<span class="role-badge owner">站长</span>';
                }
                if (data.role === 'admin') {
                    nicknameHtml += '<span class="role-badge admin">管理员</span>';
                }
                if (data.is_dojin) {
                    nicknameHtml += '<span class="role-badge dojin">同人</span>';
                }
                document.getElementById('nickname').innerHTML = nicknameHtml;
                document.getElementById('usernameDisplay').innerText = data.username;
                document.getElementById('articleCount').innerText = data.articles.length;
                document.getElementById('followersCount').innerText = data.followers_count;
                document.getElementById('followingCount').innerText = data.following_count;

                const ava = document.getElementById('avatar');
                if (data.avatar) {
                    ava.innerHTML = `<img src="/avatars/${data.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                } else {
                    ava.innerText = data.nickname.charAt(0);
                }

                const listDiv = document.getElementById('articleList');
                if (data.articles.length === 0) {
                    listDiv.innerHTML = '<p style="opacity:0.7;">暂无文章</p>';
                } else {
                    listDiv.innerHTML = data.articles.map(a => {
                        const cover = a.cover || '';
                        const coverHtml = cover
                            ? `<img class="doc-card-img" src="${cover}" alt="${a.title||a.id}" loading="lazy">`
                            : `<div class="doc-card-placeholder"><span>${a.title||a.id}</span></div>`;
                        return `<div class="doc-card" onclick="location.href='/read/${encodeURIComponent(a.id)}'">
                            ${coverHtml}
                            <div class="doc-card-info">
                                <div class="doc-card-title">${a.title||a.id}</div>
                                <div class="doc-card-meta"><span>${(a.authors||[])[0]||''}</span><span>#${a.number}</span></div>
                            </div>
                        </div>`;
                    }).join('');
                }

                const followBtn = document.getElementById('followBtn');
                const msgBtn = document.getElementById('msgBtn');

                // 已登录且不是查看自己时显示关注和私信按钮
                if (currentUser && currentUser.username !== data.username) {
                    followBtn.style.display = 'inline-block';
                    followBtn.innerText = data.is_following ? '已关注' : '关注';
                    followBtn.className = `btn ${data.is_following ? 'btn-danger' : 'btn-primary'}`;
                    followBtn.onclick = async () => {
                        const followUrl = '/api/follow/' + encodeURIComponent(data.username);
                        const res2 = await authFetch(followUrl, { method: 'POST' });
                        const d2 = await res2.json();
                        if (d2.status === 'ok') {
                            load(); // 重新加载更新关注状态
                        } else {
                            alert(d2.message || '操作失败');
                        }
                    };

                    // 显示私信按钮
                    msgBtn.style.display = 'inline-flex';
                } else {
                    followBtn.style.display = 'none';
                    msgBtn.style.display = 'none';
                }

            } catch(e) {
                document.getElementById('app').innerHTML = '<p>加载失败，请稍后再试。</p>';
            }

        window.showUserList = async function(type) {
            const url = `/api/user/${encodeURIComponent(username)}/${type}`;
            const res = await authFetch(url);
            const users = await res.json();
            let html = `<h3>${type === 'followers' ? '粉丝列表' : '关注列表'}</h3>`;
            if (users.length === 0) {
                html += '<p>暂无</p>';
            } else {
                users.forEach(u => {
                    html += `<div class="user-list-item">
                        ${u.avatar ? `<img src="/avatars/${u.avatar}">` : `<div style="width:36px;height:36px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;">${u.nickname.charAt(0)}</div>`}
                        <a href="/user/${encodeURIComponent(u.username)}">${u.nickname} (@${u.username})</a>
                    </div>`;
                });
            }
            document.getElementById('contentArea').innerHTML = html;
        };
