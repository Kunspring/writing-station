        .switch {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;

            width: 3.5em;
            height: 2em;
            transform-style: preserve-3d;
            perspective: 500px;
            animation: toggle__animation 3s infinite;
        }
        .switch::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            filter: blur(20px);
            z-index: -1;
            border-radius: 50px;
            background-color: #d8ff99;
            background-image: radial-gradient(at 21% 46%, hsla(183,65%,60%,1) 0px, transparent 50%),

            radial-gradient(at 55% 24%, hsla(138,60%,62%,1) 0px, transparent 50%);

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #fdfefedc;
            transition: .4s;
            border-radius: 30px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 1.4em;
            width: 1.4em;
            left: 0.3em;
            bottom: 0.35em;
            transition: .4s;
            border-radius: 50%;

            radial-gradient(at 23% 20%, hsla(75,98%,71%,1) 0px, transparent 50%);
        }
        .input__check:checked + .slider {
            background-color: #17202A;
        }
        .input__check:checked + .slider:before {
            transform: translateX(1.5em);
        }
        @keyframes toggle__animation {
            0%, 100% { transform: translateY(-10px) rotateX(15deg) rotateY(-20deg); }

            display: inline-flex;
            align-items: center;
            gap: 4px;

            font-size: 18px;

            transition: 100ms;
        }

            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }
        .heart-checkmark {
            height: 1.2em;
            width: 1.2em;
            transition: 100ms;
            animation: dislike_effect 400ms ease;
        }
        .heart-container input:checked ~ .heart-checkmark path {

            stroke-width: 0;

            animation: like_effect 400ms ease;

        .loader {

        .loader .text:nth-child(9) span { background: linear-gradient(to right, var(--shadow-color) 45%, var(--text-color) 48%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; }

         <div class="text"><span>吃人吃人吃人</span></div>
            <div class="text"><span>吃人吃人吃人吃人</span></div>

    <script>
        // ===== 统一认证 fetch =====
        function authFetch(url, options = {}) {
            const token = localStorage.getItem('token');
            if (token) {
                options.headers = {
                    ...options.headers,
                    'Authorization': 'Bearer ' + token
                };
            }
            return fetch(url, { ...options, signal: AbortSignal.timeout(15000) });
        }

        const themeCheckbox = document.getElementById('themeCheckbox');
        function initTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            themeCheckbox.checked = isDark;
        }
        themeCheckbox.addEventListener('change', function(e) {
            document.body.classList.toggle('dark-mode', this.checked);
            localStorage.setItem('theme', this.checked ? 'dark' : 'light');
        });
        initTheme();

        const docId = "{{ doc_id }}";
        let currentUser = null;
        let comments = [];
        let selectedRange = null, selectedText = '';
        let currentBubble = null;

        let originalMarkedHTML = '';
        const contentDiv = document.getElementById('contentArea');
        const popup = document.getElementById('selectionPopup');
        const modal = document.getElementById('commentModal');
        const commentInput = document.getElementById('commentInput');
        const quotePreview = document.getElementById('quotePreview');

        async function uploadCover() {
            const file = document.getElementById('coverUpload').files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('cover', file);
            const res = await authFetch(`/api/doc/${docId}/cover`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if (data.status === 'ok') {
                alert('封面上传成功');
                location.reload();
            } else {
                alert(data.message || '上传失败');
            }
        }

        async function restoreSession() {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('请先登录');
                window.location.href = '/';
                return false;
            }
            try {
                const res = await authFetch('/api/current_user');
                const data = await res.json();
                if (!data.user) throw new Error('token invalid');
                currentUser = data.user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                return true;
            } catch(e) {
                localStorage.removeItem('token');
                localStorage.removeItem('currentUser');
                // 在 alert 后、跳转前
                alert('登录已过期,请重新登录');
window.location.href = '/';
                return false;
            }

        }

        async function toggleTextStroke() {
            const enabled = document.getElementById('textStrokeCheckbox').checked;
            const res = await authFetch(`/api/doc/${docId}/text_stroke`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled })
            });
            if (!res.ok) alert('设置失败');
        }

        async function load() {
            const res = await authFetch(`/api/doc/${docId}`);
            if (res.status === 404) {
                try {
                    const errData = await res.json();
                    alert(errData.message || '文章不存在');
                } catch (e) {
                    alert('文章不存在');
                }
                window.location.href = '/';
                return;
            }
            if (!res.ok) {
                alert('加载文章失败');
                window.location.href = '/';
                return;
            }
            const data = await res.json();
            const titleStr = data.title || docId;
            document.getElementById('docTitle').innerHTML = data.number ? `#${data.number} ${titleStr}` : titleStr;
            const authors = data.authors || [];
            const usernames = data.author_usernames || [];
            const infoDiv = document.getElementById('authorInfo');
            if (authors.length === 0) {
                infoDiv.innerText = '作者:未知';
            } else {
                const first = authors[0];
                const others = authors.slice(1);
                const firstUser = usernames[0] ? `<a href="/user/${encodeURIComponent(usernames[0])}" style="color: var(--primary);">${first}</a>` : first;
                const othersHtml = others.map((name, i) => {
                    const uname = usernames[i+1];
                    return uname ? `<a href="/user/${encodeURIComponent(uname)}" style="color: var(--primary);">${name}</a>` : name;
                }).join('、');
                infoDiv.innerHTML = others.length === 0 ? `✍️ 第一作者:${firstUser}` : `✍️ 第一作者:${firstUser}  |  🙌 协作者:${othersHtml}`;
            }
            document.getElementById('viewCount').innerHTML = data.views || 0;
            document.getElementById('viewsInfo').style.display = 'block';
            // 渲染文章内容,如果有"作者正在编辑"标记,在顶部插入提醒
            let renderedHTML = marked.parse(data.content || '(暂无内容)');
            if (data.is_published_version) {
                renderedHTML = `<div style="background:#fff3cd;color:#856404;padding:12px;border-radius:8px;margin-bottom:16px;border:1px solid #ffeeba;">📢 作者正在编辑新内容,以下为上次发布版本。</div>` + renderedHTML;
            }
            contentDiv.innerHTML = renderedHTML;
            originalMarkedHTML = contentDiv.innerHTML;   // 后续锚点渲染依赖此变量
            updateCurrentUserAvatar();

            document.getElementById('titleInput').value = titleStr;
            document.getElementById('editModeSelect').value = data.edit_mode || 'public';
            document.getElementById('allowedUsersInput').value = (data.allowed_users || []).join(', ');
            handleModeChange();
            const isAdmin = currentUser && (currentUser.role === 'admin' || currentUser.role === 'owner');
            const isFirstAuthor = currentUser && data.authors && data.authors[0] === currentUser.nickname;
            document.getElementById('permBtn').style.display = (isFirstAuthor || isAdmin) ? 'inline-block' : 'none';
            document.getElementById('addToCollectionBtn').style.display = currentUser ? 'inline-block' : 'none';
            await loadComments();
            renderAnchors();
            renderCommentTree();

            // 淡入效果（等待加载动画至少播放1秒）
            setTimeout(() => {
    // 1. 先隐藏遮罩，确保无论如何都会被执行
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) {
        overlay.style.transition = 'opacity 0.6s ease';
        overlay.style.opacity = '0';
        setTimeout(() => {
            if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
        }, 600);
    }

    // 2. 淡入内容（对可能不存在的元素做可选的判空）
    const vi = document.getElementById('viewsInfo');
    if (vi) vi.style.opacity = '0.8';

    const fadeElements = document.querySelectorAll('.toolbar, h1, .meta, .content, .comment-section');
    fadeElements.forEach(el => el.style.opacity = '1');
}, 400);
        }

        // ===== 表情包功能（评论页） =====
        // 将内容中的 sticker/图片 URL 渲染为图片
        function renderCommentContent(text) {
            if (!text) return '';
            return text.replace(/(https?:\/\/[^\s]+\.(?:png|jpg|jpeg|gif|webp)(?:\?[^\s]*)?)/gi, function(m) {
                return '<img src="' + m + '" style="max-width:120px;max-height:120px;border-radius:8px;display:inline-block;margin:4px 0;vertical-align:middle;object-fit:cover;" loading="lazy">';
            }).replace(/(\/static\/uploads\/stickers\/[^\s]+)/g, function(m) {
                return '<img src="' + m + '" style="max-width:120px;max-height:120px;border-radius:8px;display:inline-block;margin:4px 0;vertical-align:middle;object-fit:cover;" loading="lazy">';
            });
        }

        function toggleCommentSticker(e) {
            e.stopPropagation();
            var picker = document.getElementById('commentStickerPicker');
            if (picker.style.display !== 'none') { picker.style.display = 'none'; return; }
            picker.style.display = 'block';
            loadCommentStickers();
        }
        document.addEventListener('click', function(e) {
            var picker = document.getElementById('commentStickerPicker');
            if (picker && !e.target.closest('#commentStickerPicker') && !e.target.closest('.sticker-btn')) {
                picker.style.display = 'none';
            }
        });

        async function loadCommentStickers() {
            var grid = document.getElementById('commentStickerGrid');
            try {
                var res = await authFetch('/api/stickers');
                var data = await res.json();
                var stickers = data.stickers || [];
                if (stickers.length === 0) {
                    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--secondary);padding:20px 0;font-size:0.8em;">还没有表情包，点「+ 上传」添加</div>';
                    return;
                }
                grid.innerHTML = stickers.map(function(s) {
                    return '<div style="position:relative;"><img style="width:100%;aspect-ratio:1;border-radius:8px;cursor:pointer;transition:transform 0.15s;object-fit:contain;padding:4px;background:var(--bg);" src="' + s.url + '" onclick="insertCommentSticker(\'' + s.url.replace(/'/g, "\\'") + '\')"><button style="position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(0,0,0,0.5);color:white;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;" onclick="event.stopPropagation();deleteCommentSticker(\'' + (s.name||'').replace(/'/g, "\\'") + '\')">✕</button></div>';
                }).join('');
            } catch(e) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--secondary);padding:20px 0;">加载失败</div>';
            }
        }

        function insertCommentSticker(url) {
            var input = document.getElementById('directCommentInput');
            if (input) input.value += (input.value ? ' ' : '') + url;
            document.getElementById('commentStickerPicker').style.display = 'none';
        }

        async function deleteCommentSticker(name) {
            if (!confirm('删除这个表情包？')) return;
            try {
                var res = await authFetch('/api/stickers/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                });
                var data = await res.json();
                if (data.status === 'ok') loadCommentStickers();
                else alert(data.message || '删除失败');
            } catch(e) { alert('删除失败'); }
        }

        async function uploadCommentSticker(input) {
            var file = input.files[0];
            if (!file) return;
            var formData = new FormData();
            formData.append('sticker', file);
            try {
                var res = await authFetch('/api/stickers/upload', { method: 'POST', body: formData });
                var data = await res.json();
                if (data.status === 'ok') loadCommentStickers();
                else alert(data.message || '上传失败');
            } catch(e) { alert('上传失败'); }
            input.value = '';
        }

        function updateCurrentUserAvatar() {
            const avatarDiv = document.getElementById('currentUserAvatar');
            if (currentUser) {
                if (currentUser.avatar) {
                    avatarDiv.innerHTML = `<img src="/avatars/${currentUser.avatar}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">`;
                } else {
                    avatarDiv.innerHTML = currentUser.nickname.charAt(0).toUpperCase();
                }
            } else avatarDiv.innerHTML = '?';
        }

        async function loadComments() {
            const res = await authFetch(`/api/comments/${docId}`);
            comments = await res.json();
            document.getElementById('commentCount').innerHTML = comments.length;
        }

        function renderAnchors() {
            contentDiv.innerHTML = originalMarkedHTML;
            if (!originalMarkedHTML) return;
            const sorted = [...comments]
                .filter(c => c.selectedText)
                .sort((a, b) => b.selectedText.length - a.selectedText.length || 0);
            sorted.forEach(c => {
                highlightTextInDOM(contentDiv, c.selectedText, c.id);
            });
        }

        function highlightTextInDOM(container, searchText, commentId) {
            const textNodes = [];
            const walk = (node) => {
                if (node.nodeType === Node.TEXT_NODE) {
                    textNodes.push(node);
                } else {
                    node.childNodes.forEach(walk);
                }
            };
            walk(container);
            const fullText = textNodes.map(n => n.nodeValue).join('');
            const index = fullText.indexOf(searchText);
            if (index === -1) return;
            let charCount = 0;
            let startNode, startOffset, endNode, endOffset;
            for (const node of textNodes) {
                const len = node.nodeValue.length;
                if (startNode === undefined && charCount + len > index) {
                    startNode = node;
                    startOffset = index - charCount;
                }
                if (startNode !== undefined && endNode === undefined && charCount + len >= index + searchText.length) {
                    endNode = node;
                    endOffset = index + searchText.length - charCount;
                    break;
                }
                charCount += len;
            }
            if (!startNode || !endNode) return;
            const range = document.createRange();
            range.setStart(startNode, startOffset);
            range.setEnd(endNode, endOffset);
            const span = document.createElement('span');
            span.className = 'comment-anchor';
            span.dataset.commentId = commentId;
            span.onclick = function(e) { toggleCommentBubble(e, commentId); };
            try {
                range.surroundContents(span);
            } catch(e) {
                const fragment = range.extractContents();
                span.appendChild(fragment);
                range.insertNode(span);
            }
        }

        function handleSelection(e) {
            const selection = window.getSelection();
            const text = selection.toString().trim();
            if (text.length > 0 && currentUser) {
                selectedText = text;
                selectedRange = selection.getRangeAt(0);
                const rect = selection.getRangeAt(0).getBoundingClientRect();
                popup.style.display = 'flex';
                popup.style.left = rect.left + 'px';
                popup.style.top = (rect.bottom + 5) + 'px';
                document.getElementById('selectedTextPreview').innerHTML = text.length > 15 ? text.substring(0,15)+'...' : text;
            } else {
                popup.style.display = 'none';
            }
        }

        contentDiv.addEventListener('pointerup', () => setTimeout(handleSelection, 150));
        contentDiv.addEventListener('contextmenu', (e) => {
            const sel = window.getSelection().toString().trim();
            if (sel.length > 0) {
                e.preventDefault();
                setTimeout(handleSelection, 50);
            }
        });

        document.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.comment-bubble, .comment-card, .reply-input-area, .selection-popup, #commentModal, .perm-panel')) return;
            if (!popup.contains(e.target) && !contentDiv.contains(e.target)) popup.style.display = 'none';
        });

        document.getElementById('commentBtn').addEventListener('click', () => {
            if (!currentUser) return alert('请先登录');
            quotePreview.innerHTML = selectedText;
            modal.style.display = 'flex';
            popup.style.display = 'none';
        });

        window.closeModal = () => { modal.style.display = 'none'; commentInput.value = ''; };

        window.submitComment = async function() {
            const commentText = commentInput.value.trim();
            if (!commentText) return alert('请输入评论');
            if (!selectedRange) return alert('请重新选中文字');
            const preRange = document.createRange();
            preRange.selectNodeContents(contentDiv);
            preRange.setEnd(selectedRange.startContainer, selectedRange.startOffset);
            const start = preRange.toString().length, end = start + selectedText.length;
            const anchor = { start, end, quote: selectedText };
            const res = await authFetch(`/api/comments/${docId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ selectedText, comment: commentText, anchor, parentId: null })
            });
            const data = await res.json();
            if (data.status === 'ok') {
                comments.push(data.comment);
                closeModal();
                renderAnchors();
                renderCommentTree();
                document.getElementById('commentCount').innerHTML = comments.length;
            } else alert(data.message);
        };

        window.toggleCommentBubble = function(event, commentId) {
            event.stopPropagation();
            const anchorEl = event.currentTarget;
            if (currentBubble && currentBubble.dataset.commentId === commentId) {
                currentBubble.remove(); currentBubble = null; return;
            }
            if (currentBubble) currentBubble.remove();
            const comment = comments.find(c => c.id === commentId);
            if (!comment) return;

            const avatarHtml = comment.avatar
                ? `<img src="/avatars/${comment.avatar}" onclick="location.href='/user/${encodeURIComponent(comment.username)}'" class="comment-avatar-img" style="cursor:pointer;">`
                : `<div class="comment-avatar" onclick="location.href='/user/${encodeURIComponent(comment.username)}'" style="cursor:pointer;">${comment.nickname.charAt(0).toUpperCase()}</div>`;

            const bubble = document.createElement('div');
            bubble.className = 'comment-bubble';
            bubble.dataset.commentId = commentId;
            bubble.innerHTML = `
                <div class="bubble-header">
                    ${avatarHtml}
                    <a href="/user/${encodeURIComponent(comment.username)}" class="bubble-user" style="color: var(--text); text-decoration: none;">${comment.nickname}</a>${comment.role === 'ai' ? `<span style="font-size:0.75em; margin-left:4px; background:#8b5cf6; color:white; border-radius:4px; padding:1px 6px; font-weight:600;">AI</span>` : (comment.role && comment.role !== 'user' ? `<span style="font-size:0.8em; margin-left:4px;">${comment.role==='owner'?'👑':'🛡️'}</span>` : '')}
                    <span class="bubble-time">${new Date(comment.timestamp).toLocaleString()}</span>
                </div>
                ${comment.selectedText ? `<div class="bubble-quote">"${comment.selectedText}"</div>` : ''}
                <div class="bubble-content">${renderCommentContent(comment.comment)}</div>
                <div class="bubble-actions">
                    <label class="heart-container">
    <input type="checkbox" id="bubble-check-${comment.id}" ${comment.likes && comment.likes.includes(currentUser?.username) ? 'checked' : ''} onclick="likeComment(this, '${comment.id}')">
    <div class="heart-checkmark">
        <svg viewBox="0 0 256 256"><rect fill="none" height="256" width="256"></rect><path d="M224.6,51.9a59.5,59.5,0,0,0-43-19.9,60.5,60.5,0,0,0-44,17.6L128,59.1l-7.5-7.4C97.2,28.3,59.2,26.3,35.9,47.4a59.9,59.9,0,0,0-2.3,87l83.1,83.1a15.9,15.9,0,0,0,22.6,0l81-81C243.7,113.2,245.6,75.2,224.6,51.9Z" stroke-width="10px" stroke="#000" fill="none"></path></svg>
    </div>
    <span class="like-count" id="bubble-like-${comment.id}">${comment.likes?.length || 0}</span>
</label>
                    ${comment.username === currentUser?.username ? `<span class="delete-btn" onclick="deleteComment('${comment.id}')">删除</span>` : ''}
                </div>
            `;
            document.body.appendChild(bubble);

            const anchorRect = anchorEl.getBoundingClientRect();
            let left = anchorRect.left + window.scrollX;
            let top = anchorRect.bottom + window.scrollY + 5;
            const bubbleWidth = 270;
            if (left + bubbleWidth > window.innerWidth + window.scrollX) {
                left = window.innerWidth + window.scrollX - bubbleWidth - 10;
            }
            if (left < window.scrollX + 10) {
                left = window.scrollX + 10;
            }
            bubble.style.left = left + 'px';
            bubble.style.top = top + 'px';
            currentBubble = bubble;

            setTimeout(() => {
                document.addEventListener('pointerdown', function close(e) {
                    if (currentBubble && !currentBubble.contains(e.target) && !e.target.classList.contains('comment-anchor')) {
                        currentBubble.remove(); currentBubble = null;
                        document.removeEventListener('pointerdown', close);
                    }
                }, { once: true });
            }, 10);
        };

        const likeLocks = {};
        window.likeComment = async function(checkbox, commentId) {
            if (!currentUser) {
                checkbox.checked = !checkbox.checked;
                return alert('请先登录');
            }
            if (likeLocks[commentId]) return;
            likeLocks[commentId] = true;
            try {
                const res = await authFetch(`/api/comments/${docId}/${commentId}/like`, {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    const countSpans = document.querySelectorAll(`#like-count-${commentId}, #bubble-like-${commentId}`);
                    countSpans.forEach(s => s.innerText = data.likes);
                    const c = comments.find(x => x.id === commentId);
                    if (c) {
                        if (data.action === 'liked') {
                            c.likes.push(currentUser.username);
                        } else {
                            c.likes = c.likes.filter(u => u !== currentUser.username);
                        }
                    }
                    const allCheckboxes = document.querySelectorAll(`#like-check-${commentId}, #bubble-check-${commentId}`);
                    allCheckboxes.forEach(cb => cb.checked = data.action === 'liked');
                } else {
                    checkbox.checked = !checkbox.checked;
                    alert(data.message || '操作失败');
                }
            } catch(e) {
                checkbox.checked = !checkbox.checked;
            }
            likeLocks[commentId] = false;
        };

        window.deleteComment = async (commentId) => {
            if (!confirm('确定删除此评论?')) return;
            const res = await authFetch(`/api/comments/${docId}/${commentId}`, { method: 'DELETE' });
            if (res.ok) {
                comments = comments.filter(c => c.id !== commentId);
                if (currentBubble?.dataset.commentId === commentId) { currentBubble.remove(); currentBubble = null; }
                renderAnchors(); renderCommentTree();
                document.getElementById('commentCount').innerHTML = comments.length;
            } else {
                const data = await res.json();
                alert(data.message || '删除失败');
            }
        };

        function buildCommentTree(flat) {
            const map = {}, roots = [];
            flat.forEach(c => { map[c.id] = { ...c, replies: [] }; });
            flat.forEach(c => {
                if (c.parentId && map[c.parentId]) map[c.parentId].replies.push(map[c.id]);
                else roots.push(map[c.id]);
            });
            roots.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            return roots;
        }

        function renderCommentNode(comment, isReply = false) {
            const div = document.createElement('div');
            div.className = 'comment-card';
            div.style.marginLeft = isReply ? '20px' : '0';
            div.dataset.commentId = comment.id;
            const avatarHtml = comment.avatar ? `<img src="/avatars/${comment.avatar}" onclick="location.href='/user/${encodeURIComponent(comment.username)}'" class="comment-avatar-img" style="cursor:pointer;">` : `<div class="comment-avatar" onclick="location.href='/user/${encodeURIComponent(comment.username)}'" style="cursor:pointer;">${comment.nickname.charAt(0).toUpperCase()}</div>`;
            div.innerHTML = `
                <div class="bubble-header">
                    ${avatarHtml}
                    <a href="/user/${encodeURIComponent(comment.username)}" class="bubble-user" style="color: var(--text); text-decoration: none;">${comment.nickname}</a>${comment.role === 'ai' ? `<span style="font-size:0.75em; margin-left:4px; background:#8b5cf6; color:white; border-radius:4px; padding:1px 6px; font-weight:600;">AI</span>` : (comment.role && comment.role !== 'user' ? `<span style="font-size:0.8em; margin-left:4px;">${comment.role==='owner'?'👑':'🛡️'}</span>` : '')}
                    <span class="bubble-time">${new Date(comment.timestamp).toLocaleString()}</span>
                </div>
                ${comment.selectedText ? `<div class="bubble-quote">"${comment.selectedText}"</div>` : ''}
                <div class="bubble-content">${renderCommentContent(comment.comment)}</div>
                <div class="bubble-actions">
                    <label class="heart-container">
    <input type="checkbox" id="like-check-${comment.id}" ${comment.likes && comment.likes.includes(currentUser?.username) ? 'checked' : ''} onclick="likeComment(this, '${comment.id}')">
    <div class="heart-checkmark">
        <svg viewBox="0 0 256 256"><rect fill="none" height="256" width="256"></rect><path d="M224.6,51.9a59.5,59.5,0,0,0-43-19.9,60.5,60.5,0,0,0-44,17.6L128,59.1l-7.5-7.4C97.2,28.3,59.2,26.3,35.9,47.4a59.9,59.9,0,0,0-2.3,87l83.1,83.1a15.9,15.9,0,0,0,22.6,0l81-81C243.7,113.2,245.6,75.2,224.6,51.9Z" stroke-width="10px" stroke="#000" fill="none"></path></svg>
    </div>
    <span class="like-count" id="like-count-${comment.id}">${comment.likes?.length || 0}</span>
</label>
                    <span class="basic-btn" onclick="toggleReplyBox('${comment.id}')">回复</span>
                    ${comment.username === currentUser?.username ? `<span class="delete-btn" onclick="deleteComment('${comment.id}')">删除</span>` : ''}
                </div>
                <div id="reply-box-${comment.id}" class="reply-box hidden"></div>
                <div class="replies-container" id="replies-${comment.id}"></div>
            `;
            const repliesContainer = div.querySelector(`#replies-${comment.id}`);
            if (comment.replies) {
                comment.replies.sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
                comment.replies.forEach(r => repliesContainer.appendChild(renderCommentNode(r, true)));
            }
            return div;
        }

        function renderCommentTree() {
            const container = document.getElementById('allCommentsList');
            if (comments.length === 0) { container.innerHTML = '<p style="opacity:0.7;">暂无评论,快来发表第一条吧~</p>'; return; }
            const tree = buildCommentTree(comments);
            container.innerHTML = '';
            tree.forEach(root => container.appendChild(renderCommentNode(root)));
        }

        window.toggleReplyBox = function(commentId) {
            const box = document.getElementById(`reply-box-${commentId}`);
            if (box.classList.contains('hidden')) {
                box.classList.remove('hidden');
                box.innerHTML = `<div class="reply-input-area"><textarea placeholder="写下回复..." rows="2"></textarea><button class="basic-btn"onclick="submitReply('${commentId}')">发送</button><button class="back-btn" onclick="cancelReply('${commentId}')">取消</button></div>`;
            } else { box.classList.add('hidden'); box.innerHTML = ''; }
        };
        window.cancelReply = (id) => { const box = document.getElementById(`reply-box-${id}`); box.classList.add('hidden'); box.innerHTML = ''; };
        window.submitReply = async (parentId) => {
            const box = document.getElementById(`reply-box-${parentId}`);
            const text = box.querySelector('textarea').value.trim();
            if (!text) return alert('请输入回复');
            const res = await authFetch(`/api/comments/${docId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ selectedText: '', comment: text, parentId })
            });
            const data = await res.json();
            if (data.status === 'ok') {
                comments.push(data.comment);
                await loadComments();
                renderAnchors(); renderCommentTree();
                document.getElementById('commentCount').innerHTML = comments.length;
            }
        };

        window.submitDirectComment = async () => {
            if (!currentUser) return alert('请先登录');
            const inputEl = document.getElementById('directCommentInput');
            if (!inputEl) return alert('评论框未找到,请刷新页面');
            const text = inputEl.value.trim();
            if (!text) return alert('请输入评论');
            const res = await authFetch(`/api/comments/${docId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ selectedText: '', comment: text, parentId: null })
            });
            const data = await res.json();
            if (data.status === 'ok') {
                comments.push(data.comment);
                document.getElementById('directCommentInput').value = '';
                renderAnchors(); renderCommentTree();
                document.getElementById('commentCount').innerHTML = comments.length;
            }
        };

        window.togglePermPanel = () => document.getElementById('permPanel').classList.toggle('open');
        window.handleModeChange = () => {
            document.getElementById('restrictedUsersArea').style.display = document.getElementById('editModeSelect').value === 'restricted' ? 'block' : 'none';
        };
        window.savePermission = async () => {
            if (!currentUser) return alert('请先登录');
            const mode = document.getElementById('editModeSelect').value;
            const allowed = mode === 'restricted' ? document.getElementById('allowedUsersInput').value.split(',').map(s => s.trim()).filter(s => s) : [];
            const title = document.getElementById('titleInput').value.trim();
            if (title) {
                await authFetch(`/api/doc/${docId}/title`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                document.getElementById('docTitle').innerHTML = document.getElementById('docTitle').innerHTML.replace(/^#\d+\s*/, '').replace(/.*/, title);
            }
            const res = await authFetch(`/api/doc/${docId}/permission`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode, allowed_users: allowed })
            });
            const data = await res.json();
            if (data.status === 'ok') {
                alert('权限与标题已更新');
                togglePermPanel();
            } else {
                alert(data.message || '更新失败');
            }
        };
        window.deleteArticle = async () => {
            if (!currentUser) return alert('请先登录');
            if (!confirm('确定要永久删除这篇文章吗?不可恢复!')) return;
            const res = await authFetch(`/api/doc/${docId}`, { method: 'DELETE' });
            if (res.ok) {
                window.location.href = '/';
            } else {
                alert('删除失败,可能没有权限');
            }
        };

        (async () => {
            if (await restoreSession()) {
                await load();
            }
        })();

    // ===== 合集相关 =====
    async function showCollectionPicker() {
        if (!currentUser) { alert('请先登录'); return; }
        const modal = document.getElementById('collectionPickerModal');
        modal.style.display = 'flex';
        const list = document.getElementById('collectionPickerList');
        list.innerHTML = '<p>加载中...</p>';

        const res = await authFetch('/api/my_collections');
        const collections = await res.json();
        if (collections.length === 0) {
            list.innerHTML = '<p>你还没有创建合集,<a href="/collections" style="color:var(--primary);">去创建</a></p>';
            return;
        }
        list.innerHTML = collections.map(c => `
            <div onclick="addToCollection('${c.id}')" style="padding:12px 16px; border:1px solid var(--border); border-radius:8px; margin-bottom:8px; cursor:pointer; transition:background 0.2s;" onmouseover="this.style.background='var(--card-bg)'" onmouseout="this.style.background='transparent'">
                <div style="font-weight:600;">${c.name}</div>
                <div style="font-size:0.85em; opacity:0.7;">${c.article_count} 篇文章</div>
            </div>
        `).join('');
    }

    async function addToCollection(collectionId) {
        const docId = '{{ doc_id }}';
        const res = await authFetch('/api/collections/' + collectionId + '/articles', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ doc_id: docId })
        });
        const data = await res.json();
        if (data.status === 'ok') {
            alert('已添加到合集!');
            document.getElementById('collectionPickerModal').style.display = 'none';
        } else {
            alert(data.message);
        }
    }

</script>
    <!-- 添加到合集弹窗 -->
    <script>
    // 点弹窗外部关闭
    var pickerModal = document.getElementById('collectionPickerModal');
    if (pickerModal) {
        pickerModal.addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
    }
    </script>
    <div class="modal" id="collectionPickerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:var(--card-bg); padding:24px; border-radius:16px; max-width:400px; width:90%; max-height:80vh; overflow-y:auto;">
            <h3 style="margin-top:0;">添加到合集</h3>
            <div id="collectionPickerList"></div>
            <div style="margin-top:12px;">
                <button class="basic-btn" onclick="document.getElementById('collectionPickerModal').style.display='none'">取消</button>
            </div>
        </div>
    </div>

</body>
</html>
